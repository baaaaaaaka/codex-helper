name: Codex Release Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      selection_mode:
        description: "How to choose versions to test"
        required: false
        default: targeted
        type: choice
        options:
          - targeted
          - range
          - versions
      versions:
        description: "Explicit versions (JSON array or comma/newline separated) for versions mode"
        required: false
        type: string
      min_version:
        description: "Inclusive min version for range mode"
        required: false
        default: "0.104.0"
        type: string
      max_version:
        description: "Inclusive max version for range mode; defaults to latest alpha or latest stable"
        required: false
        type: string
      include_prerelease:
        description: "Include prereleases in range/versions mode"
        required: false
        default: true
        type: boolean
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: codex-release-monitor
  cancel-in-progress: false

jobs:
  detect:
    name: Detect latest @openai/codex release
    runs-on: ubuntu-latest
    outputs:
      latest_version: ${{ steps.detect.outputs.latest_version }}
      alpha_version: ${{ steps.detect.outputs.alpha_version }}
      versions_to_test: ${{ steps.detect.outputs.versions_to_test }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Detect versions to test
        id: detect
        shell: bash
        env:
          INPUT_SELECTION_MODE: ${{ github.event.inputs.selection_mode }}
          INPUT_VERSIONS: ${{ github.event.inputs.versions }}
          INPUT_MIN_VERSION: ${{ github.event.inputs.min_version }}
          INPUT_MAX_VERSION: ${{ github.event.inputs.max_version }}
          INPUT_INCLUDE_PRERELEASE: ${{ github.event.inputs.include_prerelease }}
        run: |
          set -euo pipefail
          selection_mode="${INPUT_SELECTION_MODE:-targeted}"
          input_min_version="${INPUT_MIN_VERSION:-0.104.0}"
          input_max_version="${INPUT_MAX_VERSION:-}"
          input_include_prerelease="${INPUT_INCLUDE_PRERELEASE:-true}"
          latest_version="$(npm view @openai/codex version | tr -d '\r\n')"
          if [ -z "$latest_version" ]; then
            echo "Failed to resolve latest @openai/codex version" >&2
            exit 1
          fi
          alpha_version="$(npm view @openai/codex dist-tags.alpha 2>/dev/null | tr -d '\r\n')"
          echo "Latest @openai/codex: $latest_version"
          if [ -n "$alpha_version" ]; then
            echo "Latest @openai/codex alpha: $alpha_version"
          fi
          case "$selection_mode" in
            targeted)
              versions_to_test="$(python3 scripts/codex_release_monitor_select.py \
                --mode targeted \
                --table-path docs/codex_compatibility.md \
                --latest-version "$latest_version" \
                --alpha-version "$alpha_version")"
              ;;
            range)
              max_version="$input_max_version"
              if [ -z "$max_version" ]; then
                if [ -n "$alpha_version" ]; then
                  max_version="$alpha_version"
                else
                  max_version="$latest_version"
                fi
              fi
              include_prerelease_flag="--include-prerelease"
              if [ "$input_include_prerelease" != "true" ]; then
                include_prerelease_flag="--no-include-prerelease"
              fi
              versions_to_test="$(python3 scripts/codex_release_monitor_select.py \
                --mode range \
                --min-version "$input_min_version" \
                --max-version "$max_version" \
                "$include_prerelease_flag")"
              ;;
            versions)
              include_prerelease_flag="--include-prerelease"
              if [ "$input_include_prerelease" != "true" ]; then
                include_prerelease_flag="--no-include-prerelease"
              fi
              versions_to_test="$(python3 scripts/codex_release_monitor_select.py \
                --mode versions \
                --versions "$INPUT_VERSIONS" \
                "$include_prerelease_flag")"
              ;;
            *)
              echo "Unsupported selection_mode: $selection_mode" >&2
              exit 1
              ;;
          esac
          printf 'Selection mode: %s\n' "$selection_mode"
          printf 'Versions to test: %s\n' "$versions_to_test"
          {
            printf 'latest_version=%s\n' "$latest_version"
            printf 'alpha_version=%s\n' "$alpha_version"
            printf 'versions_to_test=%s\n' "$versions_to_test"
          } >> "$GITHUB_OUTPUT"

  test:
    name: Test Codex release (${{ matrix.version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: detect
    if: needs.detect.outputs.versions_to_test != '[]' && needs.detect.outputs.versions_to_test != ''
    env:
      CODEX_VERSION: ${{ matrix.version }}
      PLATFORM_NAME: ${{ fromJSON('{"ubuntu-latest":"linux","macos-latest":"mac","windows-latest":"windows"}')[matrix.os] }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        version: ${{ fromJSON(needs.detect.outputs.versions_to_test) }}

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install latest Codex (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          npm install -g "@openai/codex@${CODEX_VERSION}"

      - name: Install latest Codex (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          npm install -g "@openai/codex@$env:CODEX_VERSION"

      - name: Run Codex patch + yolo smoke tests
        id: smoke
        continue-on-error: true
        shell: bash
        env:
          CODEX_PATCH_TEST: "1"
          CODEX_YOLO_PATCH_TEST: "1"
        run: |
          set -euo pipefail
          go test ./internal/cloudgate -run 'TestCodexPatchIntegration|TestCodexPatchedYoloLaunchIntegration' -count=1 -v
          go test ./internal/cli -run 'TestProbeCodexIntegration|TestRunCodexNewSessionRealCodexYoloIntegration' -count=1 -v

      - name: Write platform result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          status="fail"
          if [ "${{ steps.smoke.outcome }}" = "success" ]; then
            status="pass"
          fi
          mkdir -p results
          cat > "results/${PLATFORM_NAME}-${CODEX_VERSION}.json" <<EOF
          {"platform":"${PLATFORM_NAME}","results":{"${CODEX_VERSION}":"${status}"}}
          EOF

      - name: Upload patch+yolo results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-monitor-results-${{ env.PLATFORM_NAME }}-${{ env.CODEX_VERSION }}
          path: results/${{ env.PLATFORM_NAME }}-${{ env.CODEX_VERSION }}.json

      - name: Fail when smoke failed
        if: steps.smoke.outcome != 'success'
        shell: bash
        run: |
          echo "Codex patch+yolo smoke failed on ${PLATFORM_NAME}" >&2
          exit 1

  test-linux-distros:
    name: Test Codex release (${{ matrix.version }} / ${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.versions_to_test != '[]' && needs.detect.outputs.versions_to_test != ''
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.detect.outputs.versions_to_test) }}
        platform: [rockylinux8, ubuntu20.04]

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: Build integration test binaries
        shell: bash
        run: |
          set -euo pipefail
          test_bin="$GITHUB_WORKSPACE/codex_cloudgate_test"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go test ./internal/cloudgate -c -o "$test_bin"
          chmod +x "$test_bin"
          echo "TEST_BIN_PATH=$test_bin" >> "$GITHUB_ENV"
          cli_test_bin="$GITHUB_WORKSPACE/codex_cli_test"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go test ./internal/cli -c -o "$cli_test_bin"
          chmod +x "$cli_test_bin"
          echo "CLI_TEST_BIN_PATH=$cli_test_bin" >> "$GITHUB_ENV"

      - name: Run Codex patch + yolo smoke tests (container)
        id: smoke
        continue-on-error: true
        shell: bash
        env:
          PLATFORM_NAME: ${{ matrix.platform }}
          CODEX_VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          case "${PLATFORM_NAME}" in
            rockylinux8)
              IMAGE="rockylinux:8"
              INSTALL_CMD="dnf install -y ca-certificates curl xz tar"
              ;;
            ubuntu20.04)
              IMAGE="ubuntu:20.04"
              INSTALL_CMD="apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates curl xz-utils"
              ;;
            *)
              echo "unsupported platform ${PLATFORM_NAME}" >&2
              exit 1
              ;;
          esac
          run_cmd="${INSTALL_CMD} && NODE_MIN_MAJOR=16 NODE_MAJOR=22 NODE_BIN_DIR=\$(bash /ci/install_node_local.sh) && PATH=\"\${NODE_BIN_DIR}:\$PATH\" npm install -g @openai/codex@${CODEX_VERSION} && PATH=\"\${NODE_BIN_DIR}:\$PATH\" CODEX_PATCH_TEST=1 CODEX_YOLO_PATCH_TEST=1 /codex_cloudgate_test -test.v -test.count=1 -test.run 'TestCodexPatchIntegration|TestCodexPatchedYoloLaunchIntegration' && PATH=\"\${NODE_BIN_DIR}:\$PATH\" CODEX_PATCH_TEST=1 CODEX_YOLO_PATCH_TEST=1 /codex_cli_test -test.v -test.count=1 -test.run 'TestProbeCodexIntegration|TestRunCodexNewSessionRealCodexYoloIntegration'"
          docker run --rm \
            -v "${TEST_BIN_PATH}:/codex_cloudgate_test:ro" \
            -v "${CLI_TEST_BIN_PATH}:/codex_cli_test:ro" \
            -v "${GITHUB_WORKSPACE}/scripts/ci:/ci:ro" \
            "${IMAGE}" /bin/sh -lc "$run_cmd"

      - name: Write distro result
        if: always()
        shell: bash
        env:
          PLATFORM_NAME: ${{ matrix.platform }}
          CODEX_VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          status="fail"
          if [ "${{ steps.smoke.outcome }}" = "success" ]; then
            status="pass"
          fi
          mkdir -p results
          cat > "results/${PLATFORM_NAME}-${{ matrix.version }}.json" <<EOF
          {"platform":"${PLATFORM_NAME}","results":{"${CODEX_VERSION}":"${status}"}}
          EOF

      - name: Upload patch+yolo results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-monitor-results-${{ matrix.platform }}-${{ matrix.version }}
          path: results/${{ matrix.platform }}-${{ matrix.version }}.json

      - name: Fail when smoke failed
        if: steps.smoke.outcome != 'success'
        shell: bash
        run: |
          echo "Codex patch+yolo smoke failed on ${{ matrix.platform }}" >&2
          exit 1

  update:
    name: Update Codex compatibility table
    runs-on: ubuntu-latest
    needs: [detect, test, test-linux-distros]
    if: ${{ always() && needs.detect.result == 'success' && needs.detect.outputs.versions_to_test != '[]' && needs.detect.outputs.versions_to_test != '' }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Download patch+yolo results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: codex-monitor-results-*
          path: results
          merge-multiple: true

      - name: Update compatibility table
        shell: bash
        env:
          VERSIONS_TO_UPDATE: ${{ needs.detect.outputs.versions_to_test }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import subprocess

          versions = json.loads(os.environ["VERSIONS_TO_UPDATE"])
          for version in versions:
              subprocess.run(
                  [
                      "python3",
                      "scripts/codex_compatibility_sync.py",
                      "--version",
                      version,
                      "--results-dir",
                      "results",
                      "--table-path",
                      "docs/codex_compatibility.md",
                  ],
                  check=True,
              )
          PY

      - name: Cleanup results
        if: always()
        shell: bash
        run: |
          rm -rf results

      - name: Commit changes
        shell: bash
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          git add docs/codex_compatibility.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update Codex compatibility table"
          git push
