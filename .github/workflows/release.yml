name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  asr-preflight:
    name: Teams ASR preflight (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: Managed ASR focused regressions
        shell: bash
        run: |
          set -euo pipefail
          asr_pattern='Test(ManagedQwenASRTranscriber(LlamaOptInInvokesConfiguredRuntime|AutoFallsBackToTransformers|AutoDoesNotInstallTransformersFallbackByDefault|AutoDoesNotFallbackFromLlamaRuntimeFailure|DefaultDownloadsManagedLlamaRuntime|ExplicitLlamaRejectsConfiguredMissingBinary)|ManagedASR(ParseLlamaOutputHandlesLanguageColon|Llama(ConfigUsesLightweightDiskPreflight|ModelMarkerRejectsCorruptCachedFile|RuntimeConcurrentSetupReusesSingleInstall|NativeCompatCanRepairOnlyKnownBundleIssues|BinaryMarkerRejects(MissingNativeCompatRuntime|StaleNativeCompatInterpreter)|BinaryInstall(FallsBackToCPUAssetWhenAcceleratedValidationFails|RepairsNativeCompatWithPatchelf|RestoresOldRuntimeWhenFinalNativeCompatValidationFails|RepairsNativeCompatWithGlibc239Profile|EscalatesNativeCompatProfileAfterRetry|HonorsExplicitCPUDevice)|AssetMatrixCoversExpectedAccelerationFallbacks)|FFmpegWheelAssetMatrixCoversExpectedPlatforms|PublishDirRestoresOldTargetOn(Publish|PostPublish)Failure|PackageInstallPlanIncludesTorchAndPinnedRuntimeTools|StandalonePython(PinnedAssetUsesDirectDownloadURL|DownloadRejectsSizeAndHashMismatch|DownloadsExtractsAndMarksRuntime))|EnsureManagedASRFFmpegInstallsAndReusesManagedWheel|DownloadManagedASRLlamaFile(RejectsSizeAndHashMismatch|RetriesAndReplacesExistingTarget)|ExtractManagedASRZipRejectsUnsafePath|PrepareManagedASRAudioForLlamaDownloadsManagedFFmpeg|TeamsASRFailureUserMessageClassifiesActionableFailures)$'
          go test ./internal/teams -count=1 -run "$asr_pattern" -v
          go test ./internal/cli -count=1 -run 'Test(TeamsASR(ArgsFromEnvAndServiceOverrides|TranscriberDefaultsToManagedQwenRuntime|TranscriberReadsManagedLlamaEnv)|TeamsServiceInstallPreservesScopedEnvironment)$' -v

      - name: Managed ASR real runtime smoke
        shell: bash
        run: |
          set -euo pipefail
          CODEX_HELPER_ASR_REAL_ASSET_TEST=1 go test ./internal/teams -count=1 -run 'TestManagedASRRealPinnedLlamaAndFFmpegAssetsInstallAndValidate$' -v

  teams-model-profile-preflight:
    name: Teams app-server model profile preflight (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: Model profile cancellation regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/cli -count=1 -run 'Test(PrepareTeamsAppServerModelProfile(ProxyPrepareTimesOutCI|UsesCallerCancellationCI)|TeamsCodexExecutorSessionProfilePrepareUsesTurnContextCI|CodexModelProfileFacadeEnablesExecutionTargetShellPolicy)$' -v
          go test ./internal/manager -count=1 -run 'Test(HealthClient_CheckHTTPProxyContextCancellation|FindReusableInstanceContextHonorsCancellation)$' -v

      - name: Teams non-interactive stdin regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/cli -count=1 -run 'Test(EnsureProxyPreference(ServiceDefaultsToDirectWithoutPrompt|NonTerminalDefaultsToDirectWithoutPrompt|NonInteractiveUsesConfiguredProfiles|NonInteractiveResetsIncompleteStateToDirect)|TeamsCodexLauncherModelProfileWithoutSSHServiceDefaultsDirectWhenProxyUnsetCI|RunTeamsUpgradeCodexOnceSkipsIncompleteProxyPreferenceCI|RunTeamsCodexUpgradeFromBridgeSkipsIncompleteProxyPreferenceCI|CodexInstallerCommandStdinDisabledFor(TeamsService|NonTerminal)|RunCodexInstallerDoesNotPassStdinInTeamsService|RunSystemNpmCodexUpgradeDoesNotPassStdinInTeamsService|ConfirmTeamsServiceUACPromptRejects(TeamsServiceModeWithoutReading|NonTerminalStdinWithoutBlocking)|InitProfileInteractiveRejects(TeamsServiceModeWithoutReading|NonTerminalStdinWithoutBlocking)|HistoryOpenExplicitProfileUsesProxyDespiteDisabledPreference|RunHistoryTuiExplicitProfileUsesProxyDespiteDisabledPreference)$' -v

      - name: Teams Graph proxy diagnostics regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/cli -count=1 -run 'Test(TeamsGraphProxyLocalStatus(DoesNotProbeTeamsConnect|HonorsCancellation)|TeamsGraphHTTPClientLeaseStartFailureExplainsSilentTeams|TeamsServiceStartWarnsOnlyForRegisteredUnhealthyProxyDaemon|TeamsServiceDoctorReportsTeamsGraphProxyLocalStatus)$' -v

      - name: Model choice reusable credential regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/modelprofile -count=1 -run 'Test(CodexModelCatalogJSONUsesPublicModelIDs|ThirdPartyMillionTokenProviderCatalogWindows)$' -v
          go test ./internal/cli -count=1 -run 'Test(PrepareTeamsAppServerModelProfileAllowsLegacyDeepSeekContextFingerprintCI|ModelListShows(NeedsSetupWhenFamilyCredentialExistsWithoutProfile|DisplayNamesAndCustomDefaultModel)|ModelDoctor(ExplainsMissingRecommendedProfileWithReusableCredential|ValidatesCustomProfileBackingModelChoice)|TeamsModelProfileDoctor(ExplainsMissingRecommendedProfileWithReusableCredential|ValidatesCustomProfileBackingModelChoice))$' -v

      - name: Responses adapter provider compatibility regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/responsesadapter -count=1 -run 'Test(UsageMarshalIncludesZeroCachedTokens|ProviderProfileReasoningEffortMapsXHighByProvider|OpenAIChatAdapter(HandlesUsageWithoutPromptTokenDetails|AppliesDeepSeekProviderProfile)|Facade(CompletedUsageIncludesZeroCachedTokens|ShellPolicy.*)|DefaultUpstreamHTTPClientTimesOutWaitingForResponseHeaders|OpenAIChatAdapterEmitsErrorWhenSSEBodyStaysIdle|NewUpstreamHTTPClientConfiguresBoundedProxyTransport)$' -v

  teams-runtime-preflight:
    name: Teams runtime preflight (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: Managed Node and app-server environment contracts
        shell: bash
        run: |
          set -euo pipefail
          cli_pattern='Test(TeamsStandardRuntimeRefreshesManagedNodePATHAfterExecutorCreation|RefreshTeamsAppServerPATHUsesCurrentProcessPATH|RunCodexNewSessionUsesManagedNodeWithoutSystemNode|RunBeaconWorkerJobUsesManagedNodeWithoutSystemNode|CodexRuntimeEnvironment.*|MergeCLIEnvironment.*|CodexAppAuthIdentityRuntimeEnvPrependsTargetManagedNode)$'
          process_pattern='Test(MergeAppServerProcessEnv.*|AppServerRunnerRetries(LaunchFailureBeforeInitialization|TransportFailureDuringInitialization))$'
          go test ./internal/cli -count=1 -run "$cli_pattern" -v
          go test ./internal/codexrunner -count=1 -run "$process_pattern" -v
          go test ./internal/teams -count=1 -run 'Test(InfraLaunchFailureNotice|RunQueuedTurnReframesLaunchFailure|RunQueuedTurnReportsSharedAuthMigrationBlocker)$' -v

      - name: Ambiguous execution diagnostic regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/teams -count=1 -run 'TestBridgeQueuedTurnAmbiguousErrorIncludesDiagnostic$' -v

      - name: Teams live progress guard regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/beacon -count=1 -run 'TestJobStreamWriterReaderIgnoresPartialAndOversizedLines$' -v
          go test ./internal/teams -count=1 -run 'Test(CodexEventForwarder(DoesNotFlushFinalAnswerAsProgressOnIdle|TreatsTaskCompleteAgentMessageAsTerminal)|BeaconJobExecutorStreamsPerJobSidecarBeforeTerminal)$' -v
          go test ./internal/teams -count=1 -run 'TestBridgeCanQueueLiveTurnOutbox(ChecksTargetTurn|ChecksTargetTurnSQLite|IgnoresUnrelatedSQLiteCorruption)$' -v

      - name: Teams attachment filename and artifact upload regressions
        shell: bash
        run: |
          set -euo pipefail
          attachment_file_pattern='Test(DownloadReferenceFileAttachments(UsesDriveItemMetadataName|WritesPrivateFile)|ReferenceAttachmentLocalName(TruncatesForPathBudgetAndDeduplicates|HandlesTinyPathBudgetDuplicates)|BestReferenceAttachmentNameUsesMetadataWhenAttachmentNameHasNoExtension|GraphGetSharedDriveItemMetadataReturnsNameAndMimeType|ParseArtifactManifestAllowsArbitraryExtensionsByDefault|PrepareOutboundAttachmentAllowsArbitraryExtensionAndRejectsSymlink)$'
          go test ./internal/teams -count=1 -run "$attachment_file_pattern" -v

      - name: Teams control chat scope isolation regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/teams -count=1 -run 'TestBridge(EnsureControlChatDoesNotAdoptExistingSingleMemberMeetingByTitleWithoutLocalBinding|RestoreRegistryFromStoreDoesNotAdoptForeignControlBinding|PollOnce(SyncsRecreatedControlChatFromDurableBinding|DoesNotSyncForeignControlChatBinding))$' -v
          go test ./internal/teams/store -count=1 -run 'TestSQLiteSelectedSnapshotsMatchExpectedFields$' -v

      - name: Teams durable routing authority regressions
        shell: bash
        run: |
          set -euo pipefail
          durable_routing_pattern='TestBridge(DurableProjectionSteadyStateHasNoAllocationsOrRegistryWrite|ActiveAsyncSessionForIDStateUsesDurableBindingWithoutMutatingRegistry|PollOnce(UsesDurableRecreatedWorkChatWhenRegistryIsStale|SQLitePersistsDynamicParkHandoffAndPreservesContinuation)|PollSessionResolutionFailureReleasesGlobalInboundForRetry|Process(DeferredInbound|QueuedTurns)UsesDurableRecreatedWorkChatWhenRegistryIsStale|ProcessDeferredInboundDoesNotRouteMissingDurableSessionThroughStaleRegistry(SQLite)?|SessionForIDState(PrefersDurableBindingOverStaleRegistry|DoesNotFallbackWhenDurableAuthorityRejectsRegistrySession)|IdleWorkChatAutoParkSweeperHandlesUserMessageFromIdleContinuationWithoutParking|RecreateSessionChatRebindsSessionAndRetiresOldRouting|RunningTurnTranscriptBackfillSendsStatusWithoutAdvancingMainCheckpoint)$'
          scope_authority_pattern='TestResolveStorePathFor(Maintenance(PinsLiveLegacyStoreWithoutMigrating|FreshOwnerBeatsStaleRicherStore|RejectsMultipleFreshAuthorities)|Scope(KeepsMaintenanceAuthorityAfterOwnerClears|DoesNotLetOldMaintenanceMarkerOverrideNewerStore))$'
          go test ./internal/teams -count=1 -run "$durable_routing_pattern" -v
          go test ./internal/teams -count=1 -run "$scope_authority_pattern" -v

      - name: Teams read-only diagnostics regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/cli -count=1 -run 'Test(TeamsStatusIsStrictlyReadOnlyAcrossLegacyRegistryAndStore|BuildTeamsAuthorityDiagnosticsReportsBindingAndPollHoles)$' -v
          go test ./internal/teams/store -count=1 -run 'TestLoadPathReadOnly(JSONDoesNotCreateLockOrModifyFiles|SQLite(DoesNotModifyDatabaseFamily|SeesLiveWALWithoutModifyingPersistentFiles|RetriesWhenWALAppearsDuringImmutableRead|LiveWALWithoutSHMFailsWithoutCreatingSidecar))$' -v

      - name: Teams recreate maintenance fence regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/teams/store -count=1 -run 'TestServiceControlDrainOperationFence$' -v
          go test ./internal/cli -count=1 -run 'Test(BeginTeamsBridgeDrainForChatRecreate(KeepsFencedUntilRelease|OnlyFencesPinnedStore|DoesNotMigrateLegacyStore)|TeamsChatRecreateDrainReleaseDoesNotClearNewerFence|DrainTeamsBridgeForChatRecreate(WaitsForOwnerAndClearsDrain|TimeoutClearsDrain))$' -v

      - name: Teams SQLite row-level migration regressions
        shell: bash
        run: |
          set -euo pipefail
          row_level_pattern='TestSQLite(SessionAndInboundRowUpdatesDoNotTouchColdState|ColdMetadataUpdatesDoNotRewriteHotRows|ControlChatBindingDoesNotRewriteHotRows|OfficialReleaseStoresUpgradeToCurrent)$'
          go test ./internal/teams/store -count=1 -run "$row_level_pattern" -v
          go test ./internal/teams -count=1 -run 'TestBridgeMigrateRegistryProjectionSkips(SaveWhenAlreadyMigrated|SentOnlyRegistryHistoryStoreWrite)$' -v

      - name: Teams control status display regressions
        shell: bash
        run: |
          set -euo pipefail
          control_status_pattern='Test(BridgeControlStatus(ShowsNewestActiveChatLast|ChunkingKeepsNewestActiveChatLast|ShowsFolderLastUsedCompactLinkAndParkedResume)|BridgeDashboardSessionsShowLinkedChatAndParkedResume|RenderTeamsHTMLCompactTeamsChatLinkHidesVisibleURL)$'
          go test ./internal/teams -count=1 -run "$control_status_pattern" -v

      - name: Teams group chat guard regressions
        shell: bash
        run: |
          set -euo pipefail
          group_guard_pattern='Test(BridgeGroup(WorkChat|Guard).*|Graph(CreateGroupChatUsesConfiguredMembers|SendHTMLReplyWithQuoteUsesReplyAction))$'
          bench_pattern='Test(ValidateMembersRequiresExactOwnerAndTestUser|BenchSummaryPredicates|SanitizeMarkerKeepsGraphBenchNonceStable)$'
          go test ./internal/teams -count=1 -run "$group_guard_pattern" -v
          go test ./cmd/teams-graph-bench -count=1 -run "$bench_pattern" -v

      - name: Teams cross-machine registry regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/teams/delegation -count=1 -v
          go test ./internal/teams/machineregistry -count=1 -v
          go test ./cmd/teams-registry-probe -count=1 -v
          go test ./internal/cli -count=1 -run 'Test(Delegate|CandidatesFromMachineStatuses|RootCommandWiresExpectedSubcommandsAndFlags)' -v
          go test ./internal/teams -count=1 -run 'Test(BridgeMachine(Registry|Delegation).*|Graph(CreateOrGetMeetingChat(UsesStableExternalID|WindowUsesProvidedWindow)|OnlineMeetingWindowRefresh))$' -v

      - name: Teams manual park and continuation regressions
        shell: bash
        run: |
          set -euo pipefail
          teams_poll_backlog_pattern='Test(InboundPollContinuationDoesNotForceCatchup|InboundPollContinuationDoesNotRegressActiveIntervals|InboundPollDecisionCatchupAndBlocked|BridgePollAllowsFreshHelperPrefixedUserPromptFromContinuation|BridgePollUsesDurableContinuationAfterOnePage|BridgePollPreservesOldContinuationWhenHeadAlsoTruncated|BridgeTerminalPollCleanupKeepsSharedActiveChat|BridgeControlParkSessionClearsPollState|BridgeControlParkSessionAmbiguousAndNotFound|BridgeControlParkRejectsQueuedOrRunningSession|BridgePollOnceSkipsExplicitParkedPollWithStaleContinuation|BridgeControlUnparkAliasResumesWithHeadPoll|BridgePollOnceRecoversStaleWorkContinuationErrorWithTerminalHead|StalePollContinuationErrorRequiresContinuationTokenSignal|BridgeIdleWorkChatAutoParkSweeper(DrainsIdleContinuationThenParksAndResumes|HandlesUserMessageFromIdleContinuationWithoutParking|RecoversStaleContinuationErrorWithTerminalHead|PreservesFreshHeadContinuationAfterStaleContinuationError|DoesNotRecoverContinuationForQueuedOrRunningSessions)|BridgeFinalAnswerPollBoostsLiveFinalAnswer|BridgeFinalAnswerPollBoostPreservesContinuation|BridgeFinalAnswerPollBoostSkipsTranscriptDelivery|BridgeFinalAnswerPollBoostSkipsParkedAndBlockedChats|BridgeQueuedTeamsPromptExplainsBlockedHistoryBacklog|BlockedTeamsPromptAckNextStepsMatchGateReasons)$'
          freeze_resume_pattern='Test(RenderTeamsFreezeNoticeHTML|ResumeCommandForSessionUsesNumberWithoutHashFallback|FreezeNoticeResumeCommandMatchingRequiresWholeCommand|SentFreezeNoticeExistsRequiresExactResumeCommand|BridgePollOnce(ParksIdleWorkChatAndAppendsFreezeNoticeToLatestMessage|SendsStandaloneFreezeNoticeWhenLatestMessagePatchRejected|SendsStandaloneFreezeNoticeWhenNoLatestMessageTarget|SendsStandaloneFreezeNoticeWhenLatestMessageIsNotEditable|DoesNotRepeatFreezeNoticeFrom(SentOutbox|GraphHistory))|BridgeControlResume(SessionNumberReactivatesParkedWorkChat|KeyReactivatesParkedWorkChat|KeyOnlyReactivatesMatchingParkedChat))$'
          go test ./internal/teams -count=1 -run "$teams_poll_backlog_pattern" -v
          go test ./internal/teams -count=1 -run "$freeze_resume_pattern" -v
          go test ./internal/teams/store -count=1 -run 'TestChatPollCleanupClearsContinuationBackoffAndErrorForParkedAndClosed$' -v
          go test ./internal/cli -count=1 -run 'TestTeamsStatus(SeparatesCatchupBacklogAndInactiveRows|ShowsRunningTurnDetails)$' -v

      - name: Teams message edit engine regressions
        shell: bash
        run: |
          set -euo pipefail
          lossless_annotation_pattern='Test(UserAnnotated(MessageHTMLSkipsTeamsAttachmentContext|AttachmentMessageHTMLPreservesComplexBodyShape)|BridgeAnnotate(MessageReferencePatchesWithAttachmentsAndNoMirror|FileAttachmentPatchesWithAttachmentsAndNoMirror|AttachmentPatchFailureDoesNotDisableTextAnnotationsOrMirror)|GraphUpdateChatMessageHTMLPreservingAttachments|HelperAttachmentMessageIsSelfIgnoring|BridgePollDropsPersistedInboundAfterUserAnnotation)$'
          edit_engine_pattern='Test(TeamsMessageEditExecutor(PreservesPayloadAndDoesNotFetchMessageAgain|SkipsUnsafeAttachmentContext|ClassifiesGraphFailures)|TeamsNonHTMLBodyAsHTMLPreservesLineBreaks|UserAnnotated(MessageHTMLConvertsNonHTMLContentToEscapedHTML|ASRTranscriptMessageHTMLConvertsNonHTMLContentToEscapedHTML|ASRTranscriptMessageHTMLHandlesMultipleMediaAndIsIdempotent)|BridgeAnnotate(IncomingUserMessageDoesNotMirrorWhenGraphUpdateFails|PlainSelfMessageUsesBodyOnlyPatchAndNoMirror|MentionOnlySelfMessagePreserves(MentionPayloadAndNoMirror|MismatchedMentionPayload)|ForwardedMessageReferencePatchesWithAttachmentsAndNoMirror|MixedAttachmentContextPreservesPayloadMentionsAndNoMirror|AttachmentPayloadOrderMayDifferFromPlaceholderOrder|UnsafeAttachmentContextSkipsGraphWriteAndMirror|LiteralAttachmentTagTextSkipsConservatively|IncomingUserMessageSkipsMediaCardUntilASRTranscript|ASRTranscriptPreservesMediaAttachmentMentionsAndNoMirror|ASRTranscriptBadRequestDoesNotDisableTextAnnotationsOrMirror|ASRPatchFailureDoesNotDisableTextAnnotations|ExternalAttachmentContextDoesNotPatchOrMirror)|BridgeFreezeNoticePatch(PreservesAttachments|PreservesMentions|SkipsUnsafeAttachmentContext)|AppendFreezeNoticeToMessageHTMLConvertsNonHTMLContentToEscapedHTML|BridgePollOnce(ParksIdleWorkChatAndAppendsFreezeNoticeToLatestMessage|SendsStandaloneFreezeNoticeWhenLatestMessage(PatchRejected|UnsafeToPatch)))$'
          go test ./internal/teams -count=1 -run "$lossless_annotation_pattern" -v
          go test ./internal/teams -count=1 -run "$edit_engine_pattern" -v

      - name: Helper auto-update activation and cxp upgrade regressions
        shell: bash
        run: |
          set -euo pipefail
          cli_pattern='Test(UpgradeCmd(DefaultDoesNot(TouchTeamsServiceOrRequestUAC|RestartTeamsServiceAfterUpdateError)|IgnoresBrokenEnvInstallPathAndUnifiesAliases|UnifiesDefaultInstallAliasWhenCurrentGoBinWins|CreatesMissingCXPShimForManagedDefault|RepairsStaleCXPRegularFileForManagedDefault)|EnsureCXPShimForInstallPath(RepairsStalePOSIXSymlink|CreatesWindowsCmdShim|RepairsWindowsCmdShim|KeepsNonHelperWindowsCmd)|TeamsReleaseAutoUpdaterApply(UsesRunningGoBinAndUnifiesManagedDefault|CreatesMissingCXPShim|UnifiesBrokenEnvAliases)|TeamsServiceInstall(SkipsBrokenEnvInstallPathAndRepairsManagedDefault|CreatesMissingManagedDefaultBeforeRepointingFromGoBin|CreatesMissingCXPShimWhenManagedTargetCurrent)|HandleUpdateAndRestartUnifiesCXPShimBeforeExec|RestartTeamsHelperAfterActivationPendingUsesInstalledPath|LegacyUpdater.*)$'
          teams_pattern='TestBridgeControlHelperUpdatePrereleaseActivationPending(RestartsInstalledPath|RestarterFailureKeepsNotice)$'
          go test ./internal/cli -count=1 -run "$cli_pattern" -v
          go test ./internal/teams -count=1 -run "$teams_pattern" -v

  goreleaser:
    runs-on: ubuntu-latest
    needs: [asr-preflight, teams-model-profile-preflight, teams-runtime-preflight]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-update-index:
    name: Publish static update index
    runs-on: ubuntu-latest
    needs: [goreleaser, install-smoke, helper-upgrade-compat-smoke]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update index branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          release_json="$RUNNER_TEMP/release.json"
          existing_index="$RUNNER_TEMP/existing-update-index.json"
          output_index="$RUNNER_TEMP/update-index.json"
          empty_index="$RUNNER_TEMP/empty-update-index.json"

          gh release view "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --json tagName,name,body,isDraft,isPrerelease,publishedAt,assets \
            > "$release_json"

          printf '{"version":1,"repo":"%s","releases":[]}\n' "$GITHUB_REPOSITORY" > "$empty_index"
          index_branch_exists=0
          if git ls-remote --exit-code origin refs/heads/auto-update-index >/dev/null 2>&1; then
            git fetch origin auto-update-index
            git show origin/auto-update-index:update-index.json > "$existing_index" 2>/dev/null || cp "$empty_index" "$existing_index"
            index_branch_exists=1
          else
            cp "$empty_index" "$existing_index"
          fi

          python3 scripts/release_update_index.py \
            --repo "$GITHUB_REPOSITORY" \
            --release-json "$release_json" \
            --existing-index "$existing_index" \
            --output "$output_index"

          if [[ "$index_branch_exists" == "1" ]]; then
            git checkout -B auto-update-index origin/auto-update-index
          else
            git checkout --orphan auto-update-index
          fi
          git rm -rf . >/dev/null 2>&1 || true
          cp "$output_index" update-index.json
          git add update-index.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "update-index.json already current"
            exit 0
          fi
          git commit -m "chore: update helper update index for ${GITHUB_REF_NAME}"
          git push origin auto-update-index

  install-smoke:
    name: Install smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [goreleaser]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./install.sh
          ./install.sh --repo "${GITHUB_REPOSITORY}" --version "${GITHUB_REF_NAME}" --dir "$HOME/.local/bin"
          codex_proxy_version="$("$HOME/.local/bin/codex-proxy" --version)"
          grep -q "${GITHUB_REF_NAME#v}" <<<"$codex_proxy_version"
          cxp_version="$("$HOME/.local/bin/cxp" --version)"
          grep -q "${GITHUB_REF_NAME#v}" <<<"$cxp_version"
          builtin_skill="$HOME/.agents/skills/cxp"
          test -f "$builtin_skill/SKILL.md"
          test -f "$builtin_skill/references/commands.md"
          grep -q -- "--after-current-turn" "$builtin_skill/references/commands.md"
          grep -q "standard approval broker" "$builtin_skill/references/commands.md"
          grep -q "standard approval runtime" "$builtin_skill/references/commands.md"
          "$HOME/.local/bin/codex-proxy" proxy doctor || true
          reset_out="$("$HOME/.local/bin/codex-proxy" --config "$RUNNER_TEMP/proxy-reset-smoke.json" proxy reset)"
          printf '%s\n' "$reset_out"
          grep -q 'profiles=0 instances=0 stopped=0 failed=0' <<<"$reset_out"
          grep -q 'Next launch will ask whether to configure proxy mode.' <<<"$reset_out"
          app_help="$("$HOME/.local/bin/cxp" app --help)"
          grep -q 'Install and launch the Codex desktop app' <<<"$app_help"
          app_auth_help="$("$HOME/.local/bin/cxp" app auth --help)"
          grep -q 'Authenticate Codex for the desktop app' <<<"$app_auth_help"
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            if "$HOME/.local/bin/cxp" --config "$RUNNER_TEMP/codex-desktop-unsupported.json" app --cwd "$RUNNER_TEMP" >"$RUNNER_TEMP/codex-desktop-unsupported.out" 2>&1; then
              echo "cxp app unexpectedly succeeded on Linux" >&2
              cat "$RUNNER_TEMP/codex-desktop-unsupported.out" >&2
              exit 1
            fi
            grep -q "only available for macOS and Windows" "$RUNNER_TEMP/codex-desktop-unsupported.out"
          fi
          CODEX_HELPER_BIN="$HOME/.local/bin/codex-proxy" bash scripts/ci/skills_smoke.sh
          CODEX_HELPER_BIN="$HOME/.local/bin/codex-proxy" bash scripts/ci/skills_migration_smoke.sh
          CODEX_HELPER_BIN="$HOME/.local/bin/cxp" bash scripts/ci/skills_smoke.sh
          CODEX_HELPER_BIN="$HOME/.local/bin/cxp" bash scripts/ci/skills_migration_smoke.sh
          upgrade_target="$RUNNER_TEMP/codex-proxy-upgrade-smoke/codex-proxy"
          mkdir -p "$(dirname "$upgrade_target")"
          upgrade_skill_repo="$RUNNER_TEMP/codex-proxy-upgrade-skill-repo"
          mkdir -p "$upgrade_skill_repo/skills/review"
          cat > "$upgrade_skill_repo/skills/review/SKILL.md" <<'SKILL'
          ---
          name: review
          description: Upgrade migration smoke skill
          ---
          upgrade migration body
          SKILL
          git -C "$upgrade_skill_repo" init
          git -C "$upgrade_skill_repo" config user.name "Upgrade Skill Smoke"
          git -C "$upgrade_skill_repo" config user.email "upgrade-skill-smoke@example.invalid"
          git -C "$upgrade_skill_repo" add -A
          git -C "$upgrade_skill_repo" commit -m "initial upgrade skill"
          "$HOME/.local/bin/codex-proxy" skills add "$upgrade_skill_repo" --name upskill --ref HEAD --path skills/review --target codex-home --yes
          legacy_git_skill="$HOME/.codex/skills/upskill__review"
          agents_git_skill="$HOME/.agents/skills/upskill__review"
          test -f "$legacy_git_skill/SKILL.md"
          rm -rf "$agents_git_skill"
          legacy_builtin="$HOME/.codex/skills/cxp"
          rm -rf "$legacy_builtin"
          mkdir -p "$(dirname "$legacy_builtin")"
          cp -a "$builtin_skill" "$legacy_builtin"
          rm -rf "$builtin_skill"
          "$HOME/.local/bin/codex-proxy" upgrade --repo "${GITHUB_REPOSITORY}" --version "${GITHUB_REF_NAME}" --install-path "$upgrade_target"
          upgrade_version="$("$upgrade_target" --version)"
          grep -q "${GITHUB_REF_NAME#v}" <<<"$upgrade_version"
          test -f "$builtin_skill/SKILL.md"
          test -f "$builtin_skill/references/commands.md"
          test ! -e "$legacy_builtin"
          test -f "$agents_git_skill/SKILL.md"
          test ! -e "$legacy_git_skill"

      - name: Install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $installDir = Join-Path $env:USERPROFILE ".local\\bin"
          .\\install.ps1 -Repo $env:GITHUB_REPOSITORY -Version $env:GITHUB_REF_NAME -InstallDir $installDir
          $exe = Join-Path $installDir "codex-proxy.exe"
          $cxp = Join-Path $installDir "cxp.cmd"
          & $exe --version | Select-String ($env:GITHUB_REF_NAME.TrimStart("v")) | Out-Null
          & $cxp --version | Select-String ($env:GITHUB_REF_NAME.TrimStart("v")) | Out-Null
          $builtinSkill = Join-Path $env:USERPROFILE ".agents\skills\cxp"
          if (!(Test-Path -LiteralPath (Join-Path $builtinSkill "SKILL.md"))) { throw "builtin cxp SKILL.md missing" }
          $builtinReference = Join-Path $builtinSkill "references\commands.md"
          if (!(Test-Path -LiteralPath $builtinReference)) { throw "builtin cxp command reference missing" }
          if ((Get-Content -Raw -LiteralPath $builtinReference) -notmatch "--after-current-turn") { throw "builtin cxp command reference missing deferred beacon switch guidance" }
          if ((Get-Content -Raw -LiteralPath $builtinReference) -notmatch "standard approval broker") { throw "builtin cxp command reference missing standard approval broker guidance" }
          if ((Get-Content -Raw -LiteralPath $builtinReference) -notmatch "standard approval runtime") { throw "builtin cxp command reference missing standard approval runtime guidance" }
          & $exe proxy doctor | Out-Default
          $resetConfig = Join-Path $env:RUNNER_TEMP "proxy-reset-smoke.json"
          $resetOut = (& $exe --config $resetConfig proxy reset | Out-String)
          $resetOut | Out-Default
          if ($resetOut -notmatch "profiles=0 instances=0 stopped=0 failed=0") { throw "proxy reset smoke did not report empty reset counts" }
          if ($resetOut -notmatch "Next launch will ask whether to configure proxy mode.") { throw "proxy reset smoke did not mention next prompt" }
          & $cxp app --help | Select-String "Install and launch the Codex desktop app" | Out-Null
          & $cxp app auth --help | Select-String "Authenticate Codex for the desktop app" | Out-Null
          $env:CODEX_HELPER_BIN = $exe
          .\scripts\ci\skills_smoke.ps1
          .\scripts\ci\skills_migration_smoke.ps1
          $env:CODEX_HELPER_BIN = $cxp
          .\scripts\ci\skills_smoke.ps1
          .\scripts\ci\skills_migration_smoke.ps1
          Remove-Item Env:\CODEX_HELPER_BIN
          $upgradeDir = Join-Path $env:RUNNER_TEMP "codex-proxy-upgrade-smoke"
          New-Item -ItemType Directory -Force -Path $upgradeDir | Out-Null
          $upgradeTarget = Join-Path $upgradeDir "codex-proxy.exe"
          $upgradeSkillRepo = Join-Path $env:RUNNER_TEMP "codex-proxy-upgrade-skill-repo"
          New-Item -ItemType Directory -Force -Path (Join-Path $upgradeSkillRepo "skills\review") | Out-Null
          Set-Content -LiteralPath (Join-Path $upgradeSkillRepo "skills\review\SKILL.md") -NoNewline -Encoding UTF8 -Value @'
          ---
          name: review
          description: Upgrade migration smoke skill
          ---
          upgrade migration body
          '@
          & git -C $upgradeSkillRepo init
          & git -C $upgradeSkillRepo config user.name "Upgrade Skill Smoke"
          & git -C $upgradeSkillRepo config user.email "upgrade-skill-smoke@example.invalid"
          & git -C $upgradeSkillRepo add -A
          & git -C $upgradeSkillRepo commit -m "initial upgrade skill"
          & $exe skills add $upgradeSkillRepo --name upskill --ref HEAD --path skills/review --target codex-home --yes
          $legacyGitSkill = Join-Path $env:USERPROFILE ".codex\skills\upskill__review"
          $agentsGitSkill = Join-Path $env:USERPROFILE ".agents\skills\upskill__review"
          if (!(Test-Path -LiteralPath (Join-Path $legacyGitSkill "SKILL.md"))) { throw "legacy git skill missing before upgrade migration" }
          Remove-Item -Recurse -Force -LiteralPath $agentsGitSkill -ErrorAction SilentlyContinue
          $legacyBuiltin = Join-Path $env:USERPROFILE ".codex\skills\cxp"
          Remove-Item -Recurse -Force -LiteralPath $legacyBuiltin -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path (Split-Path -Parent $legacyBuiltin) | Out-Null
          Copy-Item -Recurse -LiteralPath $builtinSkill -Destination $legacyBuiltin
          Remove-Item -Recurse -Force -LiteralPath $builtinSkill -ErrorAction SilentlyContinue
          & $exe upgrade --repo $env:GITHUB_REPOSITORY --version $env:GITHUB_REF_NAME --install-path $upgradeTarget
          & $upgradeTarget --version | Select-String ($env:GITHUB_REF_NAME.TrimStart("v")) | Out-Null
          if (!(Test-Path -LiteralPath (Join-Path $builtinSkill "SKILL.md"))) { throw "upgrade did not reinstall builtin cxp SKILL.md" }
          if (!(Test-Path -LiteralPath $builtinReference)) { throw "upgrade did not reinstall builtin cxp command reference" }
          if (Test-Path -LiteralPath $legacyBuiltin) { throw "upgrade did not hide legacy builtin cxp directory" }
          if (!(Test-Path -LiteralPath (Join-Path $agentsGitSkill "SKILL.md"))) { throw "upgrade did not migrate git subscription skill" }
          if (Test-Path -LiteralPath $legacyGitSkill) { throw "upgrade did not hide legacy git subscription directory" }

  helper-upgrade-compat-smoke:
    name: Helper upgrade compat (${{ matrix.target.os }}, ${{ matrix.target.service_backend }}, ${{ matrix.old_tag }} -> current)
    runs-on: ${{ matrix.target.os }}
    needs: [goreleaser]
    strategy:
      fail-fast: false
      matrix:
        old_tag:
          - v0.0.48
          - v0.1.0
          - v0.1.1
          - v0.1.2
          - v0.1.3
          - v0.1.4
          - v0.1.5
          - v0.1.6
          - v0.1.7
          - v0.1.8
          - v0.1.9
          - v0.1.10
          - v0.1.11
          - v0.1.12
        target:
          - os: ubuntu-latest
            service_backend: local-supervisor
          - os: ubuntu-latest
            service_backend: systemd-user
          - os: macos-latest
            service_backend: launchd
          - os: windows-latest
            service_backend: windows-task

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Split-entry upgrade convergence (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          REPO: ${{ github.repository }}
          OLD_TAG: ${{ matrix.old_tag }}
          TARGET_TAG: ${{ github.ref_name }}
          FETCHER: curl
          SERVICE_BACKEND: ${{ matrix.target.service_backend }}
        run: |
          set -euo pipefail
          bash scripts/ci/helper_upgrade_compat_smoke.sh

      - name: Split-entry upgrade convergence (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          REPO: ${{ github.repository }}
          OLD_TAG: ${{ matrix.old_tag }}
          TARGET_TAG: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          .\scripts\ci\helper_upgrade_compat_smoke.ps1

  install-container-smoke:
    name: Install smoke (containers)
    runs-on: ubuntu-latest
    needs: [goreleaser]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ubuntu:20.04
            fetcher: curl
          - image: rockylinux:8
            fetcher: wget
          - image: centos:7
            fetcher: curl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install + run in ${{ matrix.image }}
        shell: bash
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          tag="${GITHUB_REF_NAME}"
          img="${{ matrix.image }}"
          fetcher="${{ matrix.fetcher }}"

          docker run --rm \
            -v "$PWD/scripts/ci:/ci:ro" \
            -e REPO="$repo" \
            -e TAG="$tag" \
            -e FETCHER="$fetcher" \
            "$img" bash /ci/container_install_smoke.sh
