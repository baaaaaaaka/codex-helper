            -v "$PWD/dist:/dist:ro" "$img" \
            /dist/codex_cli_test -test.v -test.count=1 -test.run='TestTeamsBackgroundKeepalive'
          docker run --rm --user 1000:1000 \
            -e HOME=/tmp/codex-home \
            -e XDG_CONFIG_HOME=/tmp/codex-config \
            -e XDG_CACHE_HOME=/tmp/codex-cache \
            -e CODEX_HELPER_TEAMS_TOKEN_CACHE=/tmp/codex-cache/teams-missing-token.json \
            -e CODEX_HELPER_TEAMS_READ_TOKEN_CACHE=/tmp/codex-cache/teams-missing-read-token.json \
            -e CODEX_HELPER_TEAMS_FILE_WRITE_TOKEN_CACHE=/tmp/codex-cache/teams-missing-file-token.json \
            -v "$PWD/dist:/dist:ro" "$img" \
            /dist/codex_cli_test -test.v -test.count=1 -test.run='TestTeamsServiceWatchdog(LifecycleStatePrecedenceMatrix|RecoverableDrainWinsOverSeparatePausedState|ManyStateFilesRecoveryMatrix|MergeDoesNotRecoverPausedStateDrain|Restarts(ExpiredHelperUpgradeDrain|StaleHelperReloadDrain)WithLocalOwner|DoesNotRestart(ExpiredHelperUpgradeDrain|StaleHelperReloadDrain)WithRemoteFreshOwner|RemoteFreshOwnerWinsOverLocal(Upgrade|Reload)Evidence|DoesNotRestart(ExpiredHelperUpgradeDrain|StaleHelperReloadDrain)WithActiveTurn|(ExpiredHelperUpgradeDrain|StaleHelperReloadDrain)RespectsRestartCooldown|MergeDetects(ExpiredHelperUpgradeDrain|StaleHelperReloadDrain)(LocalOwner|RemoteOwner))$'
          docker run --rm --user 1000:1000 \
            -e HOME=/tmp/codex-home \
            -e XDG_CONFIG_HOME=/tmp/codex-config \
            -e XDG_CACHE_HOME=/tmp/codex-cache \
            -e CODEX_HELPER_TEAMS_TOKEN_CACHE=/tmp/codex-cache/teams-missing-token.json \
            -e CODEX_HELPER_TEAMS_READ_TOKEN_CACHE=/tmp/codex-cache/teams-missing-read-token.json \
            -e CODEX_HELPER_TEAMS_FILE_WRITE_TOKEN_CACHE=/tmp/codex-cache/teams-missing-file-token.json \
            -v "$PWD/dist:/dist:ro" "$img" \
            /dist/codex_teams_test -test.v -test.count=1 -test.run="$teams_runtime_keepalive"
          docker run --rm --user 1000:1000 \
            -e HOME=/tmp/codex-home \
            -e XDG_CONFIG_HOME=/tmp/codex-config \
            -e XDG_CACHE_HOME=/tmp/codex-cache \
            -e CODEX_HELPER_TEAMS_TOKEN_CACHE=/tmp/codex-cache/teams-missing-token.json \
            -e CODEX_HELPER_TEAMS_READ_TOKEN_CACHE=/tmp/codex-cache/teams-missing-read-token.json \
            -e CODEX_HELPER_TEAMS_FILE_WRITE_TOKEN_CACHE=/tmp/codex-cache/teams-missing-file-token.json \
            -v "$PWD/dist:/dist:ro" "$img" \
            /dist/codex_teams_store_test -test.v -test.count=1 -test.run="$teams_runtime_keepalive"
          echo "==> $img (Teams artifact/transcript/simulated-live tests as non-root uid 1000)"
          docker run --rm --user 1000:1000 \
            -e HOME=/tmp/codex-home \
