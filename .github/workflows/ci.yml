name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: Check CI helper scripts (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/ci/install_node_local.sh

      - name: Script unit tests (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          python3 -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Script unit tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          py -3 -m unittest discover -s scripts/tests -p "test_*.py"

      - name: gofmt (verify)
        shell: bash
        run: |
          bad="$(gofmt -l .)"
          if [ -n "$bad" ]; then
            echo "gofmt required for:"
            echo "$bad"
            exit 1
          fi

      - name: go mod tidy (verify)
        shell: bash
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "go.mod/go.sum not tidy"
            git diff go.mod go.sum
            exit 1
          fi

      - name: Cross-compile check (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          GOOS=darwin  GOARCH=arm64 go build ./...
          GOOS=darwin  GOARCH=amd64 go build ./...
          GOOS=windows GOARCH=amd64 go build ./...
          GOOS=linux   GOARCH=arm64 go build ./...

      - name: Setup SSHD for integration tests (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo bash scripts/ci/retry.sh 5 5 apt-get update
          sudo bash scripts/ci/retry.sh 5 5 apt-get install -y openssh-server
          sudo mkdir -p /run/sshd
          SSH_TEST_USER="ssh-test"
          if ! id -u "$SSH_TEST_USER" >/dev/null 2>&1; then
            sudo useradd -m -s /bin/bash -p '$6$ci$WiNqQDjl.EMvmwex4uixbzCpYwPdZ5pjMhtV6AMb004JamOVMOgqYaNOYOgWVmv/1Eq9TSb.yuZ94xGrgVNuS/' "$SSH_TEST_USER"
          fi
          SSH_TEST_DIR="$(mktemp -d)"
          ssh-keygen -t ed25519 -N "" -f "$SSH_TEST_DIR/host_key"
          ssh-keygen -t ed25519 -N "" -f "$SSH_TEST_DIR/test_key"
          sudo install -d -m 700 -o "$SSH_TEST_USER" -g "$SSH_TEST_USER" "/home/$SSH_TEST_USER/.ssh"
          sudo install -m 600 -o "$SSH_TEST_USER" -g "$SSH_TEST_USER" "$SSH_TEST_DIR/test_key.pub" "/home/$SSH_TEST_USER/.ssh/authorized_keys"
          chmod 700 "$SSH_TEST_DIR"
          chmod 600 "$SSH_TEST_DIR/test_key" "$SSH_TEST_DIR/test_key.pub" "$SSH_TEST_DIR/host_key"
          cat > "$SSH_TEST_DIR/sshd_config" <<EOF
          Port 22222
          ListenAddress 127.0.0.1
          HostKey $SSH_TEST_DIR/host_key
          AuthorizedKeysFile /home/$SSH_TEST_USER/.ssh/authorized_keys
          PasswordAuthentication no
          ChallengeResponseAuthentication no
          KbdInteractiveAuthentication no
          UsePAM no
          PermitRootLogin no
          PubkeyAuthentication yes
          StrictModes no
          AllowTcpForwarding yes
          PermitOpen any
          PidFile $SSH_TEST_DIR/sshd.pid
          AllowUsers ${SSH_TEST_USER}
          LogLevel ERROR
          EOF
          sudo /usr/sbin/sshd -t -f "$SSH_TEST_DIR/sshd_config"
          sudo /usr/sbin/sshd -f "$SSH_TEST_DIR/sshd_config"
          for i in {1..20}; do
            if ssh -i "$SSH_TEST_DIR/test_key" -p 22222 \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o BatchMode=yes \
              "${SSH_TEST_USER}@127.0.0.1" exit; then
              break
            fi
            sleep 0.2
          done
          echo "SSH_TEST_ENABLED=1" >> "$GITHUB_ENV"
          echo "SSH_TEST_HOST=127.0.0.1" >> "$GITHUB_ENV"
          echo "SSH_TEST_PORT=22222" >> "$GITHUB_ENV"
          echo "SSH_TEST_USER=${SSH_TEST_USER}" >> "$GITHUB_ENV"
          echo "SSH_TEST_KEY=$SSH_TEST_DIR/test_key" >> "$GITHUB_ENV"

      - name: Installer shell matrix tests (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          go test . -count=1 -run 'TestInstallSh'

      - name: Installer PATH/profile tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          go test . -count=1 -run 'TestInstallPs1'

      - name: Recent run/installer/reuse regressions (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/cli -count=1 -run 'TestRunLike(UsesDirectModeWhenProxyDisabled|UsesDefaultCodexCommandInDirectMode|UsesProxyPreferenceWhenEnabled|ExplicitProfileForcesProxy|PersistsProxyEnabledAfterProfileSetup|ExplicitProfilePersistsProxyEnabledAfterProfileSetup)$'
          go test ./internal/proc ./internal/manager ./internal/cli -count=1 -run 'Test(CommandLine|LooksLikeProxyDaemonCmdline|FindReusableInstance(PicksMostRecentHealthy|IgnoresWrongInstanceID|SkipsUnhealthy)|WithProfileInstallEnvSkipsLegacyInstance|RunWithProfileOptionsSkipsLegacyInstance)$'
          go test . -count=1 -run 'TestInstallSh(ReloadsPathWhenHomeContainsSpaces|RemovesLegacyCodexClp|RemovesLegacyCodexClaudeProxyAndClpSymlink|RemovesCodexOwnedClaudeProxyWithoutVersionOutput|PreservesExternalClpSymlinkToClaudeProxy)$'

      - name: Recent run/installer/reuse regressions (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          go test ./internal/cli -count=1 -run 'TestRunLike(UsesDirectModeWhenProxyDisabled|UsesDefaultCodexCommandInDirectMode|UsesProxyPreferenceWhenEnabled|ExplicitProfileForcesProxy|PersistsProxyEnabledAfterProfileSetup|ExplicitProfilePersistsProxyEnabledAfterProfileSetup)$'
          go test ./internal/proc ./internal/manager ./internal/cli -count=1 -run 'Test(CommandLine|LooksLikeProxyDaemonCmdline|FindReusableInstance(PicksMostRecentHealthy|IgnoresWrongInstanceID|SkipsUnhealthy)|WithProfileInstallEnvSkipsLegacyInstance|RunWithProfileOptionsSkipsLegacyInstance)$'
          go test . -count=1 -run 'TestInstallPs1(RemovesLegacyCodexClpExe|RemovesLegacyCodexClaudeProxyAndClpCmd|PreservesExternalClpCmdReferencingClaudeProxy)$'

      - name: Recent codexhistory shared-cache regressions (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/codexhistory ./internal/tui -count=1

      - name: Recent codexhistory shared-cache regressions (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          go test ./internal/codexhistory ./internal/tui -count=1

      - name: Root/home/identity regressions (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          pattern='Test(DefaultPathForHome|ResolveEffectivePaths(_|$)|ResolveEffectiveLaunchPaths(_|$)|NewRootStore_PathOnlyAllowsForeignHomeWithoutRunnableIdentity|CodexExecutionContextForRun(RequiresRunnableIdentityForForeignHome|UsesResolvedForeignHomeAndExecIdentity)|ExecIdentityFor(HomeRejectsUnknownNonRootOwner|UserResolvesSupplementaryGroups)|ApplyExecIdentitySetsCommandCredentialAndEnv|PrepareYoloAuthOverrideReownsAuthFilesForExecIdentity|PrepareCodexSelfUpdateGuardEnv(PrependsWrapper|SkipsUnknownSource|ReownsWrapperForExecIdentity)|PreparePatchedBinaryForLaunchUsesAccessibleArtifactsForExecIdentity|RunWith(ExistingInstanceOptionsPreservesExplicitCodexHomeEnv|NewStackOptionsPreservesExplicitCodexHomeEnv)|ProxyStartBackgroundPassesResolvedConfigPathToDaemon|ResolveCodexDirSelection_).*$'
          go test ./internal/cli ./internal/codexhistory ./internal/config ./internal/cloudgate -count=1 -run "$pattern"

      - name: Root/home/identity regressions (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $pattern = 'Test(DefaultPathForHome|ResolveEffectivePaths(_|$)|ResolveEffectiveLaunchPaths(_|$)|NewRootStore_PathOnlyAllowsForeignHomeWithoutRunnableIdentity|CodexExecutionContextForRun(RequiresRunnableIdentityForForeignHome|UsesResolvedForeignHomeAndExecIdentity)|ExecIdentityFor(HomeRejectsUnknownNonRootOwner|UserResolvesSupplementaryGroups)|ApplyExecIdentitySetsCommandCredentialAndEnv|PrepareYoloAuthOverrideReownsAuthFilesForExecIdentity|PrepareCodexSelfUpdateGuardEnv(PrependsWrapper|SkipsUnknownSource|ReownsWrapperForExecIdentity)|PreparePatchedBinaryForLaunchUsesAccessibleArtifactsForExecIdentity|RunWith(ExistingInstanceOptionsPreservesExplicitCodexHomeEnv|NewStackOptionsPreservesExplicitCodexHomeEnv)|ProxyStartBackgroundPassesResolvedConfigPathToDaemon|ResolveCodexDirSelection_).*$'
          go test ./internal/cli ./internal/codexhistory ./internal/config ./internal/cloudgate -count=1 -run $pattern

      - name: go vet
        run: go vet ./...

      - name: go test (with coverage)
        shell: bash
        run: |
          go test -coverprofile=coverage.out ./...

      - name: go test -race (Linux only)
        if: runner.os == 'Linux'
        run: go test -race ./...

      - name: Coverage gate (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          threshold="40.0"
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/,"",$NF); print $NF}')"
          echo "Total coverage: ${total}% (threshold ${threshold}%)"
          awk -v total="$total" -v threshold="$threshold" 'BEGIN { if (total+0 < threshold+0) { printf("coverage %.2f%% < %.2f%%\n", total, threshold); exit 1 } }'

      - name: Upload coverage artifact (Linux only)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

      - name: Install Codex for integration (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci/retry.sh 5 5 npm install -g @openai/codex || true

      - name: Install Codex for integration (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          & .\scripts\ci\retry.ps1 5 5 npm install -g '@openai/codex'

      - name: Codex upgrade integration (system npm, Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          retire_path() {
            node -e 'const crypto=require("crypto"); const path=require("path"); const p=process.argv[1]; const hash=crypto.createHash("sha1").update(p).digest("base64").replace(/[^a-zA-Z0-9]+/g, "").slice(0, 8); console.log(path.resolve(path.dirname(p), `.${path.basename(p)}-${hash}`));' "$1"
          }
          seed_stale_codex_backup() {
            local prefix="$1"
            local pkg_dir="$prefix/lib/node_modules/@openai/codex"
            local pkg_retired
            pkg_retired="$(retire_path "$pkg_dir")"
            mkdir -p "$pkg_retired"
            echo stale > "$pkg_retired/README.md"
            local bin_retired
            bin_retired="$(retire_path "$prefix/bin/codex")"
            echo stale > "$bin_retired"
          }
          bash scripts/ci/retry.sh 5 5 npm install -g @openai/codex
          system_prefix="$(npm prefix -g)"
          seed_stale_codex_backup "$system_prefix"
          go run ./cmd/codex-proxy --config "$RUNNER_TEMP/codex-upgrade-system.json" --upgrade-codex
          codex --version >/dev/null
          upgraded_path="$(command -v codex)"
          case "$upgraded_path" in
            "$system_prefix"/*) ;;
            *)
              echo "expected system npm codex under $system_prefix, got $upgraded_path"
              exit 1
              ;;
          esac

      - name: Codex upgrade integration (local npm, Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          retire_path() {
            node -e 'const crypto=require("crypto"); const path=require("path"); const p=process.argv[1]; const hash=crypto.createHash("sha1").update(p).digest("base64").replace(/[^a-zA-Z0-9]+/g, "").slice(0, 8); console.log(path.resolve(path.dirname(p), `.${path.basename(p)}-${hash}`));' "$1"
          }
          seed_stale_codex_backup() {
            local prefix="$1"
            local pkg_dir="$prefix/lib/node_modules/@openai/codex"
            local pkg_retired
            pkg_retired="$(retire_path "$pkg_dir")"
            mkdir -p "$pkg_retired"
            echo stale > "$pkg_retired/README.md"
            local bin_retired
            bin_retired="$(retire_path "$prefix/bin/codex")"
            echo stale > "$bin_retired"
          }
          local_prefix="$RUNNER_TEMP/codex-local-prefix"
          bash scripts/ci/retry.sh 5 5 npm install -g --prefix "$local_prefix" @openai/codex
          export CODEX_NPM_PREFIX="$local_prefix"
          export PATH="$local_prefix/bin:$local_prefix:$PATH"
          seed_stale_codex_backup "$local_prefix"
          go run ./cmd/codex-proxy --config "$RUNNER_TEMP/codex-upgrade-local.json" --upgrade-codex
          codex --version >/dev/null
          upgraded_path="$(command -v codex)"
          case "$upgraded_path" in
            "$local_prefix"/*) ;;
            *)
              echo "expected local npm codex under $local_prefix, got $upgraded_path"
              exit 1
              ;;
          esac

      - name: Codex upgrade integration (system npm, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          function Get-RetirePath([string]$PathValue) {
            $sha1 = [System.Security.Cryptography.SHA1]::Create()
            try {
              $hashBytes = $sha1.ComputeHash([System.Text.Encoding]::UTF8.GetBytes($PathValue))
            } finally {
              $sha1.Dispose()
            }
            $base64 = [Convert]::ToBase64String($hashBytes)
            $slug = -join ($base64.ToCharArray() | Where-Object { [char]::IsLetterOrDigit($_) })
            if ($slug.Length -gt 8) {
              $slug = $slug.Substring(0, 8)
            }
            Join-Path (Split-Path -Parent $PathValue) ('.' + (Split-Path -Leaf $PathValue) + '-' + $slug)
          }
          function New-StaleCodexBackup([string]$Prefix) {
            $pkgDir = Join-Path $Prefix "node_modules\@openai\codex"
            $pkgRetired = Get-RetirePath $pkgDir
            New-Item -ItemType Directory -Force -Path $pkgRetired | Out-Null
            Set-Content -Path (Join-Path $pkgRetired "README.md") -Value "stale"
            $ps1Retired = Get-RetirePath (Join-Path $Prefix "codex.ps1")
            Set-Content -Path $ps1Retired -Value "stale"
          }
          & .\scripts\ci\retry.ps1 5 5 npm install -g '@openai/codex'
          $systemPrefix = (npm prefix -g).Trim()
          New-StaleCodexBackup $systemPrefix
          go run ./cmd/codex-proxy --config "$env:RUNNER_TEMP\codex-upgrade-system.json" --upgrade-codex
          & codex --version | Out-Null
          $upgradedPath = (Get-Command codex).Source
          if (-not $upgradedPath.ToLower().StartsWith($systemPrefix.ToLower())) {
            throw "expected system npm codex under $systemPrefix, got $upgradedPath"
          }

      - name: Codex upgrade integration (local npm, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          function Get-RetirePath([string]$PathValue) {
            $sha1 = [System.Security.Cryptography.SHA1]::Create()
            try {
              $hashBytes = $sha1.ComputeHash([System.Text.Encoding]::UTF8.GetBytes($PathValue))
            } finally {
              $sha1.Dispose()
            }
            $base64 = [Convert]::ToBase64String($hashBytes)
            $slug = -join ($base64.ToCharArray() | Where-Object { [char]::IsLetterOrDigit($_) })
            if ($slug.Length -gt 8) {
              $slug = $slug.Substring(0, 8)
            }
            Join-Path (Split-Path -Parent $PathValue) ('.' + (Split-Path -Leaf $PathValue) + '-' + $slug)
          }
          function New-StaleCodexBackup([string]$Prefix) {
            $pkgDir = Join-Path $Prefix "node_modules\@openai\codex"
            $pkgRetired = Get-RetirePath $pkgDir
            New-Item -ItemType Directory -Force -Path $pkgRetired | Out-Null
            Set-Content -Path (Join-Path $pkgRetired "README.md") -Value "stale"
            $ps1Retired = Get-RetirePath (Join-Path $Prefix "codex.ps1")
            Set-Content -Path $ps1Retired -Value "stale"
          }
          $localPrefix = Join-Path $env:RUNNER_TEMP "codex-local-prefix"
          & .\scripts\ci\retry.ps1 5 5 npm install -g --prefix $localPrefix '@openai/codex'
          $localBin = Join-Path $localPrefix "bin"
          $env:CODEX_NPM_PREFIX = $localPrefix
          $env:PATH = "$localPrefix;$localBin;$env:PATH"
          New-StaleCodexBackup $localPrefix
          go run ./cmd/codex-proxy --config "$env:RUNNER_TEMP\codex-upgrade-local.json" --upgrade-codex
          & codex --version | Out-Null
          $upgradedPath = (Get-Command codex).Source
          if (-not $upgradedPath.ToLower().StartsWith($localPrefix.ToLower())) {
            throw "expected local npm codex under $localPrefix, got $upgradedPath"
          }

      - name: Codex patch+yolo integration test (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          CODEX_PATCH_TEST: "1"
          CODEX_YOLO_PATCH_TEST: "1"
        run: |
          set -euo pipefail
          if command -v codex >/dev/null 2>&1; then
            go test ./internal/cloudgate -run 'TestCodexPatchIntegration|TestCodexPatchedYoloLaunchIntegration' -count=1 -v
            go test ./internal/cli -run 'TestProbeCodexIntegration|TestRunCodexNewSessionRealCodexYoloIntegration' -count=1 -v
          else
            echo "Codex not available, skipping patch+yolo integration test"
          fi

      - name: Codex patch+yolo integration test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CODEX_PATCH_TEST: "1"
          CODEX_YOLO_PATCH_TEST: "1"
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          if (Get-Command codex -ErrorAction SilentlyContinue) {
            go test ./internal/cloudgate -run 'TestCodexPatchIntegration|TestCodexPatchedYoloLaunchIntegration' -count=1 -v
            go test ./internal/cli -run 'TestProbeCodexIntegration|TestRunCodexNewSessionRealCodexYoloIntegration' -count=1 -v
          } else {
            Write-Host "Codex not available, skipping patch integration test"
          }

      - name: Managed-node install integration (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        env:
          CODEX_INSTALL_TEST: "1"
        run: |
          set -euo pipefail
          go test ./internal/cli -run TestEnsureCodexInstalledIntegrationManagedNode -count=1 -v

  linux-distro-smoke:
    name: Linux distro smoke (CentOS7/Rocky8/Ubuntu20.04)
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: Build static linux-amd64 binary
        shell: bash
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o dist/codex-proxy ./cmd/codex-proxy
          chmod +x dist/codex-proxy

      - name: Smoke test in containers (doctor)
        shell: bash
        run: |
          set -euo pipefail
          for img in centos:7 rockylinux:8 ubuntu:20.04; do
            echo "==> $img"
            if [ "$img" = "centos:7" ]; then
              docker run --rm -v "$PWD/dist:/dist:ro" "$img" bash -c '
                sed -i "s/^mirrorlist=/#mirrorlist=/g" /etc/yum.repos.d/CentOS-Base.repo 2>/dev/null || true
                sed -i "s|^#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g" /etc/yum.repos.d/CentOS-Base.repo 2>/dev/null || true
                /dist/codex-proxy proxy doctor'
            else
              docker run --rm -v "$PWD/dist:/dist:ro" "$img" /dist/codex-proxy proxy doctor
            fi
          done

      - name: Build CLI test binary
        shell: bash
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go test ./internal/cli -c -o dist/codex_cli_test
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go test ./internal/cloudgate -c -o dist/codex_cloudgate_test
          chmod +x dist/codex_cli_test dist/codex_cloudgate_test

      - name: Run tests in containers
        shell: bash
        run: |
          set -euo pipefail
          for img in centos:7 rockylinux:8 ubuntu:20.04; do
            echo "==> $img (cloudgate tests)"
            docker run --rm -v "$PWD/dist:/dist:ro" "$img" \
              /dist/codex_cloudgate_test -test.v -test.count=1
            echo "==> $img (cli tests)"
            docker run --rm -v "$PWD/dist:/dist:ro" "$img" \
              /dist/codex_cli_test -test.v -test.count=1 -test.run 'Test[^I]'
          done

      - name: Codex upgrade smoke in Linux containers (system/local)
        shell: bash
        run: |
          set -euo pipefail
          for img in centos:7 rockylinux:8 ubuntu:20.04; do
            echo "==> $img (codex upgrade command)"
            docker run --rm \
              -v "$PWD/dist:/dist:ro" \
              -v "$PWD/scripts/ci:/ci:ro" \
              "$img" bash -lc '
                set -euo pipefail
                if command -v apt-get >/dev/null 2>&1; then
                  bash /ci/install_container_packages.sh ca-certificates curl xz-utils tar
                elif command -v dnf >/dev/null 2>&1; then
                  bash /ci/install_container_packages.sh ca-certificates curl xz tar
                elif command -v yum >/dev/null 2>&1; then
                  bash /ci/install_container_packages.sh ca-certificates curl xz tar
                else
                  echo "unsupported package manager for codex upgrade smoke"
                  exit 1
                fi

                NODE_MIN_MAJOR=16 NODE_MAJOR=22 NODE_BIN_DIR="$(bash /ci/install_node_local.sh)"
                export PATH="$NODE_BIN_DIR:$PATH"

                bash /ci/retry.sh 5 5 npm install -g @openai/codex
                system_prefix="$(npm prefix -g)"
                /dist/codex-proxy --config /tmp/codex-upgrade-system.json --upgrade-codex
                codex --version >/dev/null
                system_path="$(command -v codex)"
                case "$system_path" in
                  "$system_prefix"/*) ;;
                  *)
                    echo "expected system codex under $system_prefix, got $system_path"
                    exit 1
                    ;;
                esac

                local_prefix="/tmp/codex-local-prefix"
                bash /ci/retry.sh 5 5 npm install -g --prefix "$local_prefix" @openai/codex
                export CODEX_NPM_PREFIX="$local_prefix"
                export PATH="$local_prefix/bin:$local_prefix:$PATH"
                /dist/codex-proxy --config /tmp/codex-upgrade-local.json --upgrade-codex
                codex --version >/dev/null
                local_path="$(command -v codex)"
                case "$local_path" in
                  "$local_prefix"/*) ;;
                  *)
                    echo "expected local codex under $local_prefix, got $local_path"
                    exit 1
                    ;;
                esac
              '
          done
