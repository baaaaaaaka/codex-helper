  full-go-test:
    name: Full go test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: go test (with coverage, Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          go test -timeout=20m -parallel=16 -coverprofile=coverage.out ./...

      - name: go test (without coverage, non-Linux)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          go test -timeout=20m -parallel=16 ./...

      - name: Coverage gate (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          threshold="40.0"
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/,"",$NF); print $NF}')"
          echo "Total coverage: ${total}% (threshold ${threshold}%)"
          awk -v total="$total" -v threshold="$threshold" 'BEGIN { if (total+0 < threshold+0) { printf("coverage %.2f%% < %.2f%%\n", total, threshold); exit 1 } }'

      - name: Upload coverage artifact (Linux only)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  race-test:
    name: Race test (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: go test -race (Linux only)
        run: go test -race ./...

  linux-distro-smoke-build:
    name: Linux distro smoke build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: Build static linux-amd64 binary
        shell: bash
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o dist/codex-proxy ./cmd/codex-proxy
          chmod +x dist/codex-proxy

      - name: Build CLI test binary
        shell: bash
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go test ./internal/cli -c -o dist/codex_cli_test
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go test ./internal/cloudgate -c -o dist/codex_cloudgate_test
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go test ./internal/proc -c -o dist/codex_proc_test
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go test ./internal/teams -c -o dist/codex_teams_test
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go test ./internal/teams/store -c -o dist/codex_teams_store_test
          chmod +x dist/codex_cli_test dist/codex_cloudgate_test dist/codex_proc_test dist/codex_teams_test dist/codex_teams_store_test

      - name: Upload Linux distro smoke binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-distro-smoke-dist
          path: dist/
          if-no-files-found: error

  linux-distro-smoke:
    name: Linux distro smoke (${{ matrix.label }})
    runs-on: ubuntu-latest
    needs: [linux-distro-smoke-build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: CentOS7
            image: centos:7
            package_args: ca-certificates curl xz tar
          - label: Rocky8
            image: rockylinux:8
            package_args: ca-certificates curl xz tar
          - label: Ubuntu20.04
            image: ubuntu:20.04
            package_args: ca-certificates curl xz-utils tar
    env:
      DISTRO_IMAGE: ${{ matrix.image }}
      DISTRO_PACKAGE_ARGS: ${{ matrix.package_args }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux distro smoke binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-distro-smoke-dist
          path: dist

      - name: Restore executable bits
        shell: bash
        run: chmod +x dist/codex-proxy dist/codex_cli_test dist/codex_cloudgate_test dist/codex_proc_test dist/codex_teams_test dist/codex_teams_store_test

      - name: Smoke test in container (doctor)
        shell: bash
        run: |
          set -euo pipefail
          img="$DISTRO_IMAGE"
          echo "==> $img"
          if [ "$img" = "centos:7" ]; then
            docker run --rm -v "$PWD/dist:/dist:ro" "$img" bash -c '
              sed -i "s/^mirrorlist=/#mirrorlist=/g" /etc/yum.repos.d/CentOS-Base.repo 2>/dev/null || true
              sed -i "s|^#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g" /etc/yum.repos.d/CentOS-Base.repo 2>/dev/null || true
              /dist/codex-proxy proxy doctor'
          else
            docker run --rm -v "$PWD/dist:/dist:ro" "$img" /dist/codex-proxy proxy doctor
          fi

      - name: Run tests in containers
        shell: bash
        run: |
          set -euo pipefail
          teams_resource_pattern='Test(BridgePollDrops(HelperAttachmentEchoWithoutDurableMatch|RenderedHelperLabelOutputInWorkChat)|IsHelperAttachmentEchoMessageVariants|BridgePollOnceDoesNotRewriteStateForUnchangedNotDuePolls|InboundPollDecisionAlreadyPersistedRequiresBlockedStateToMatch|P1ArtifactManifest(WithoutFileWriteAuthLeavesFinalVisibleAndWarns|RejectedAfterFinalWhenAuthExists)|BridgeAttachment(SendFailureRestartReusesUploadedDriveItem|ReplayRejectsTamperedStagedFileBeforeUpload)|HistoryTieredScanTailDoesNotConsumeIncompleteTrailingLine|SimulatedLive(TeamsRenderCasesRoundTripThroughGraphCI|HelperE2EControlWorkAndStatusCI))$'
          teams_replay_fencing_pattern='Test(Bridge(InterruptedTurnDropsLateStreamingStatus|ShouldIgnoreFreshRenderedHelperCanceledEcho|TranscriptImportDeliveryLedgerPreventsBatchReplayAfterOutboxPruneAndCheckpointRegression|CompletesTurnWithTranscriptFinalForCanonicalDedupe|StreamingFinalUsesTranscriptCanonicalBeforeClosingForwarder|StreamingErrorDoesNotSuppressPendingFinalLikeProgress|TranscriptCanonicalFinal(PreservesObservedArtifactManifest|RequiresSameCodexTurn)|SyncLinkedTranscript(DeliveryLedgerPreventsReplayAfterOutboxPruneAndCheckpointRegression|MultipartDeliveryLedgerPreventsReplayAfterOutboxPruneAndCheckpointRegression|DeliveredLedgerDoesNotTriggerBacklogBlockAfterCheckpointRegression|StressSkipsLiveStatusesBeforeCheckpointWindow|SkipsStatusAlreadySkippedByTextHash|SkipsFinalAlreadySentLiveBeforeCheckpoint)|Flush(RecoversGraphMessageIDAfterAcceptedPersistFailure|RecoversAcceptedOutboxFromGraphAfterRestart|DefersGraphRecoveryWhenListMessagesFails|DoesNotGraphRecoverOrdinaryQueuedSendError))|KnownTranscriptOutboxDedupeStressCompactCountsOldLiveBeforeCheckpoint|MarkTurnInterruptedSkipsPendingTransientOutbox|RecordTranscriptDeliveryAdvancesCheckpointPosition)$'
          img="$DISTRO_IMAGE"
          echo "==> $img (cloudgate tests)"
          docker run --rm -v "$PWD/dist:/dist:ro" "$img" \
            /dist/codex_cloudgate_test -test.v -test.count=1
          echo "==> $img (cli tests)"
          docker run --rm -v "$PWD/dist:/dist:ro" "$img" \
            /dist/codex_cli_test -test.v -test.count=1 -test.run='Test[^I]'
          echo "==> $img (proc zombie/parser tests)"
          docker run --rm -v "$PWD/dist:/dist:ro" "$img" \
            /dist/codex_proc_test -test.v -test.count=1 -test.run='Test(IsAliveTreatsLinuxZombieAsDead|LinuxProcStateFromStatParsesLastParen)$'
          echo "==> $img (Teams resource cleanup, artifact, transcript, and simulated-live tests)"
          docker run --rm -v "$PWD/dist:/dist:ro" "$img" \
            /dist/codex_teams_test -test.v -test.count=1 -test.run="$teams_resource_pattern"
          docker run --rm -v "$PWD/dist:/dist:ro" "$img" \
            /dist/codex_teams_store_test -test.v -test.count=1 -test.run='TestChatPollSchedule(NoopDoesNotRewriteState|BlockedNoopPreservesPreviousState|ParkedNoopPreservesParkedAt)$'
          echo "==> $img (Teams replay fencing tests)"
          docker run --rm -v "$PWD/dist:/dist:ro" "$img" \
            /dist/codex_teams_test -test.v -test.count=1 -test.run="$teams_replay_fencing_pattern"
          docker run --rm -v "$PWD/dist:/dist:ro" "$img" \
            /dist/codex_teams_store_test -test.v -test.count=1 -test.run="$teams_replay_fencing_pattern"

      - name: Teams background keepalive tests in containers (non-root)
        shell: bash
        run: |
          set -euo pipefail
          teams_runtime_keepalive='Test(TeamsBackgroundKeepalive|TeamsStartupFallback|InboundPoll|Bridge(LongRunningTurnKeepsOwnerHeartbeatActive|IdleOwnerHeartbeatPreservesActiveTurnFields|ListenStandbyDoesNotCreateControlChatOrPoll|PollChatReadRateLimitBlocksOnlyThatChat|ControlPollRateLimitDoesNotBlockWorkPollingWithoutRetrySleep|PollOnceContinuesOtherDueChatsAfterReadRateLimit|AckSendFailureDoesNotBlockCodexTurn|OutboxUploadRateLimitRecordsBlockWithoutRetrySleep|AcceptedOutboxRecoveryRateLimitRecordsBlockWithoutRetrySleep|FlushPromotesAcceptedOutboxDuringRateLimitWithoutPosting|ReloadDraining(SessionMessage|ControlNew)IsDeferredAndReplayed)|BridgeControlRestart(DoesNotRunDuringHelperReloadCodexUpgradeOrManualDrain|RunsAfterExpiredHelperUpgradeDrain|DoesNotRecoverExpiredHelperUpgradeOwnedByRemoteMachine|NowBlocksExpiredHelperUpgradeWithActiveTurn|ForceRunsAfterExpiredHelperUpgradeWithActiveTurn|RunsAfterStaleHelperReloadDrain|DoesNotRecoverStaleHelperReloadOwnedByRemoteMachine|NowBlocksStaleHelperReloadWithActiveTurn|ForceRunsAfterStaleHelperReloadWithActiveTurn)|BridgeControlReload(RetriesStaleHelperReloadDrain|DoesNotRecoverStaleHelperReloadOwnedByRemoteMachine|NowBlocksStaleHelperReloadWithActiveTurn)|Bridge(CompletesExpiredHelperUpgradeDrainOnStart|DoesNotCompleteExpiredHelperUpgradeDrainOwnedByRemoteMachine)|ClaimControlLease(PrimaryBeatsEphemeralAndEphemeralStaysStandby|DoesNotPreemptActiveTurn|ConcurrentManyMachinesSingleActive)|ControlLeaseForwardJumpAllowsTakeoverAfterSleep|IsStaleHandlesFutureHeartbeatAndThresholdBoundary|ValidateAndReleaseControlLease|RecordOwnerHeartbeat(WritesAndReadsOwner|UpdatesExistingOwner|TreatsExecRestartAsSameOwner|RefusesLiveOwnerWithDiagnostic|ReplacesDeadLocalOwnerBeforeStale)|RecoverStaleOwner(ReplacesStaleOwner|TreatsExecRestartAsSameOwner|ReplacesDeadLocalOwnerBeforeStale|RefusesLiveOwner)|ClearOwner(IsIdempotent|IfSameDoesNotClearDifferentOwner|IfSameDoesNotClearSameProcessDifferentInstance)|Helper(UpgradeDrainExpired|ReloadDrainStale)|OwnerAppearsLocal|PendingOutboxCrashRecoveryPromotesAcceptedDespiteRateLimitedChat|Graph(DoesNotRetryPostServerErrors|RetriesPostTooManyRequestsAfterRetryAfter))'
          teams_nonroot_artifact='Test(P1ArtifactManifest(WithoutFileWriteAuthLeavesFinalVisibleAndWarns|RejectedAfterFinalWhenAuthExists)|BridgeAttachment(SendFailureRestartReusesUploadedDriveItem|ReplayRejectsTamperedStagedFileBeforeUpload)|HistoryTieredScanTailDoesNotConsumeIncompleteTrailingLine|SimulatedLive(TeamsRenderCasesRoundTripThroughGraphCI|HelperE2EControlWorkAndStatusCI))$'
          img="$DISTRO_IMAGE"
          echo "==> $img (Teams keepalive tests as non-root uid 1000)"
          docker run --rm --user 1000:1000 \
            -e HOME=/tmp/codex-home \
            -e XDG_CONFIG_HOME=/tmp/codex-config \
            -e XDG_CACHE_HOME=/tmp/codex-cache \
            -e CODEX_HELPER_TEAMS_TOKEN_CACHE=/tmp/codex-cache/teams-missing-token.json \
            -e CODEX_HELPER_TEAMS_READ_TOKEN_CACHE=/tmp/codex-cache/teams-missing-read-token.json \
            -e CODEX_HELPER_TEAMS_FILE_WRITE_TOKEN_CACHE=/tmp/codex-cache/teams-missing-file-token.json \
            -v "$PWD/dist:/dist:ro" "$img" \
            /dist/codex_cli_test -test.v -test.count=1 -test.run='TestTeamsBackgroundKeepalive'
          docker run --rm --user 1000:1000 \
            -e HOME=/tmp/codex-home \
            -e XDG_CONFIG_HOME=/tmp/codex-config \
            -e XDG_CACHE_HOME=/tmp/codex-cache \
            -e CODEX_HELPER_TEAMS_TOKEN_CACHE=/tmp/codex-cache/teams-missing-token.json \
            -e CODEX_HELPER_TEAMS_READ_TOKEN_CACHE=/tmp/codex-cache/teams-missing-read-token.json \
            -e CODEX_HELPER_TEAMS_FILE_WRITE_TOKEN_CACHE=/tmp/codex-cache/teams-missing-file-token.json \
            -v "$PWD/dist:/dist:ro" "$img" \
            /dist/codex_cli_test -test.v -test.count=1 -test.run='TestTeamsServiceWatchdog(LifecycleStatePrecedenceMatrix|RecoverableDrainWinsOverSeparatePausedState|ManyStateFilesRecoveryMatrix|MergeDoesNotRecoverPausedStateDrain|Restarts(ExpiredHelperUpgradeDrain|StaleHelperReloadDrain)WithLocalOwner|DoesNotRestart(ExpiredHelperUpgradeDrain|StaleHelperReloadDrain)WithRemoteFreshOwner|RemoteFreshOwnerWinsOverLocal(Upgrade|Reload)Evidence|DoesNotRestart(ExpiredHelperUpgradeDrain|StaleHelperReloadDrain)WithActiveTurn|(ExpiredHelperUpgradeDrain|StaleHelperReloadDrain)RespectsRestartCooldown|MergeDetects(ExpiredHelperUpgradeDrain|StaleHelperReloadDrain)(LocalOwner|RemoteOwner))$'
          docker run --rm --user 1000:1000 \
            -e HOME=/tmp/codex-home \
            -e XDG_CONFIG_HOME=/tmp/codex-config \
            -e XDG_CACHE_HOME=/tmp/codex-cache \
            -e CODEX_HELPER_TEAMS_TOKEN_CACHE=/tmp/codex-cache/teams-missing-token.json \
            -e CODEX_HELPER_TEAMS_READ_TOKEN_CACHE=/tmp/codex-cache/teams-missing-read-token.json \
            -e CODEX_HELPER_TEAMS_FILE_WRITE_TOKEN_CACHE=/tmp/codex-cache/teams-missing-file-token.json \
            -v "$PWD/dist:/dist:ro" "$img" \
            /dist/codex_teams_test -test.v -test.count=1 -test.run="$teams_runtime_keepalive"
          docker run --rm --user 1000:1000 \
            -e HOME=/tmp/codex-home \
            -e XDG_CONFIG_HOME=/tmp/codex-config \
            -e XDG_CACHE_HOME=/tmp/codex-cache \
            -e CODEX_HELPER_TEAMS_TOKEN_CACHE=/tmp/codex-cache/teams-missing-token.json \
            -e CODEX_HELPER_TEAMS_READ_TOKEN_CACHE=/tmp/codex-cache/teams-missing-read-token.json \
            -e CODEX_HELPER_TEAMS_FILE_WRITE_TOKEN_CACHE=/tmp/codex-cache/teams-missing-file-token.json \
            -v "$PWD/dist:/dist:ro" "$img" \
            /dist/codex_teams_store_test -test.v -test.count=1 -test.run="$teams_runtime_keepalive"
          echo "==> $img (Teams artifact/transcript/simulated-live tests as non-root uid 1000)"
          docker run --rm --user 1000:1000 \
            -e HOME=/tmp/codex-home \
            -e XDG_CONFIG_HOME=/tmp/codex-config \
            -e XDG_CACHE_HOME=/tmp/codex-cache \
            -e CODEX_HELPER_TEAMS_TOKEN_CACHE=/tmp/codex-cache/teams-missing-token.json \
            -e CODEX_HELPER_TEAMS_READ_TOKEN_CACHE=/tmp/codex-cache/teams-missing-read-token.json \
            -e CODEX_HELPER_TEAMS_FILE_WRITE_TOKEN_CACHE=/tmp/codex-cache/teams-missing-file-token.json \
            -v "$PWD/dist:/dist:ro" "$img" \
            /dist/codex_teams_test -test.v -test.count=1 -test.run="$teams_nonroot_artifact"
          echo "==> $img (Teams detached supervisor smoke as non-root uid 1000)"
          docker run --rm --user 1000:1000 \
            -e HOME=/tmp/codex-home \
            -e RUNNER_TEMP=/tmp/codex-runner-temp \
            -v "$PWD/scripts/ci:/ci:ro" "$img" \
            bash /ci/teams_supervisor_smoke.sh

      - name: Codex upgrade smoke in Linux containers (system/local)
        shell: bash
        run: |
          set -euo pipefail
          img="$DISTRO_IMAGE"
          echo "==> $img (codex upgrade command)"
          docker run --rm \
            -e DISTRO_PACKAGE_ARGS="$DISTRO_PACKAGE_ARGS" \
            -v "$PWD/dist:/dist:ro" \
            -v "$PWD/scripts/ci:/ci:ro" \
            "$img" bash -lc '
              set -euo pipefail
              if command -v apt-get >/dev/null 2>&1 || command -v dnf >/dev/null 2>&1 || command -v yum >/dev/null 2>&1; then
                # shellcheck disable=SC2086
                bash /ci/install_container_packages.sh $DISTRO_PACKAGE_ARGS
              else
                echo "unsupported package manager for codex upgrade smoke"
                exit 1
              fi

              NODE_MIN_MAJOR=16 NODE_MAJOR=22 NODE_BIN_DIR="$(bash /ci/install_node_local.sh)"
              export PATH="$NODE_BIN_DIR:$PATH"

              bash /ci/retry.sh 5 5 npm install -g --include=optional @openai/codex
              system_prefix="$(npm prefix -g)"
              /dist/codex-proxy --config /tmp/codex-upgrade-system.json --upgrade-codex
              codex --version >/dev/null
              system_path="$(command -v codex)"
              case "$system_path" in
                "$system_prefix"/*) ;;
                *)
                  echo "expected system codex under $system_prefix, got $system_path"
                  exit 1
                  ;;
              esac

              local_prefix="/tmp/codex-local-prefix"
              bash /ci/retry.sh 5 5 npm install -g --prefix "$local_prefix" --include=optional @openai/codex
              export CODEX_NPM_PREFIX="$local_prefix"
              export PATH="$local_prefix/bin:$local_prefix:$PATH"
              /dist/codex-proxy --config /tmp/codex-upgrade-local.json --upgrade-codex
              codex --version >/dev/null
              local_path="$(command -v codex)"
              case "$local_path" in
                "$local_prefix"/*) ;;
                *)
                  echo "expected local codex under $local_prefix, got $local_path"
                  exit 1
                  ;;
              esac
            '

  test:
    name: Test (${{ matrix.os }})
    runs-on: ubuntu-latest
    needs:
      - targeted-test
      - full-go-test
      - race-test
      - linux-distro-smoke-build
      - linux-distro-smoke
    if: ${{ always() }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Verify parallel CI shards
        shell: bash
        run: |
          set -euo pipefail
          failures=0
          check() {
            name="$1"
            result="$2"
            echo "$name: $result"
            if [ "$result" != "success" ]; then
              failures=$((failures + 1))
            fi
          }
          check targeted-test "${{ needs.targeted-test.result }}"
          check full-go-test "${{ needs.full-go-test.result }}"
          check race-test "${{ needs.race-test.result }}"
          check linux-distro-smoke-build "${{ needs.linux-distro-smoke-build.result }}"
          check linux-distro-smoke "${{ needs.linux-distro-smoke.result }}"
          if [ "$failures" -ne 0 ]; then
            echo "$failures CI shard(s) failed or did not run"
            exit 1
          fi
