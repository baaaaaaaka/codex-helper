          echo "==> $img (Teams replay fencing tests)"
          docker run --rm -v "$PWD/dist:/dist:ro" "$img" \
            /dist/codex_teams_test -test.v -test.count=1 -test.run="$teams_replay_fencing_pattern"
          docker run --rm -v "$PWD/dist:/dist:ro" "$img" \
            /dist/codex_teams_store_test -test.v -test.count=1 -test.run="$teams_replay_fencing_pattern"

      - name: Teams background keepalive tests in containers (non-root)
        shell: bash
        run: |
          set -euo pipefail
          teams_runtime_keepalive='Test(TeamsBackgroundKeepalive|TeamsStartupFallback|InboundPoll|Bridge(LongRunningTurnKeepsOwnerHeartbeatActive|IdleOwnerHeartbeatPreservesActiveTurnFields|ListenStandbyDoesNotCreateControlChatOrPoll|PollChatReadRateLimitBlocksOnlyThatChat|ControlPollRateLimitDoesNotBlockWorkPollingWithoutRetrySleep|PollOnceContinuesOtherDueChatsAfterReadRateLimit|AckSendFailureDoesNotBlockCodexTurn|OutboxUploadRateLimitRecordsBlockWithoutRetrySleep|AcceptedOutboxRecoveryRateLimitRecordsBlockWithoutRetrySleep|FlushPromotesAcceptedOutboxDuringRateLimitWithoutPosting|ReloadDraining(SessionMessage|ControlNew)IsDeferredAndReplayed)|BridgeControlRestart(DoesNotRunDuringHelperReloadCodexUpgradeOrManualDrain|RunsAfterExpiredHelperUpgradeDrain|DoesNotRecoverExpiredHelperUpgradeOwnedByRemoteMachine|NowBlocksExpiredHelperUpgradeWithActiveTurn|ForceRunsAfterExpiredHelperUpgradeWithActiveTurn|RunsAfterStaleHelperReloadDrain|DoesNotRecoverStaleHelperReloadOwnedByRemoteMachine|NowBlocksStaleHelperReloadWithActiveTurn|ForceRunsAfterStaleHelperReloadWithActiveTurn)|BridgeControlReload(RetriesStaleHelperReloadDrain|DoesNotRecoverStaleHelperReloadOwnedByRemoteMachine|NowBlocksStaleHelperReloadWithActiveTurn)|Bridge(CompletesExpiredHelperUpgradeDrainOnStart|DoesNotCompleteExpiredHelperUpgradeDrainOwnedByRemoteMachine)|ClaimControlLease(PrimaryBeatsEphemeralAndEphemeralStaysStandby|DoesNotPreemptActiveTurn|ConcurrentManyMachinesSingleActive)|ControlLeaseForwardJumpAllowsTakeoverAfterSleep|IsStaleHandlesFutureHeartbeatAndThresholdBoundary|ValidateAndReleaseControlLease|RecordOwnerHeartbeat(WritesAndReadsOwner|UpdatesExistingOwner|TreatsExecRestartAsSameOwner|RefusesLiveOwnerWithDiagnostic|ReplacesDeadLocalOwnerBeforeStale)|RecoverStaleOwner(ReplacesStaleOwner|TreatsExecRestartAsSameOwner|ReplacesDeadLocalOwnerBeforeStale|RefusesLiveOwner)|ClearOwner(IsIdempotent|IfSameDoesNotClearDifferentOwner|IfSameDoesNotClearSameProcessDifferentInstance)|Helper(UpgradeDrainExpired|ReloadDrainStale)|OwnerAppearsLocal|PendingOutboxCrashRecoveryPromotesAcceptedDespiteRateLimitedChat|Graph(DoesNotRetryPostServerErrors|RetriesPostTooManyRequestsAfterRetryAfter))'
          teams_nonroot_artifact='Test(CodexOutputSymbolStressSurvivesTeamsCitationFilter|StripOAIMemoryCitationBlocks(RemovesInlineClosedBlock|PreservesFencedExamples|PreservesLiteralMultilineTagStress)|PlanTeamsHTMLChunks(Preserves(StatusListItemLines|LineBoundariesAcrossLimits)|UnicodeStressKeepsMarkersAndLimits|TextConservationStressCorpus|MarkdownTableKeepsEveryRow)|P1ArtifactManifest(WithoutFileWriteAuthLeavesFinalVisibleAndWarns|RejectedAfterFinalWhenAuthExists)|BridgeAttachment(SendFailureRestartReusesUploadedDriveItem|ReplayRejectsTamperedStagedFileBeforeUpload)|DownloadReferenceFileAttachments(UsesDriveItemMetadataName|WritesPrivateFile)|ReferenceAttachmentLocalName(TruncatesForPathBudgetAndDeduplicates|HandlesTinyPathBudgetDuplicates)|BestReferenceAttachmentNameUsesMetadataWhenAttachmentNameHasNoExtension|GraphGetSharedDriveItemMetadataReturnsNameAndMimeType|ParseArtifactManifestAllowsArbitraryExtensionsByDefault|PrepareOutboundAttachmentAllowsArbitraryExtensionAndRejectsSymlink|HistoryTieredScanTailDoesNotConsumeIncompleteTrailingLine|SimulatedLive(TeamsRenderCasesRoundTripThroughGraphCI|HelperE2EControlWorkAndStatusCI))$'
          img="$DISTRO_IMAGE"
          echo "==> $img (Teams keepalive tests as non-root uid 1000)"
          docker run --rm --user 1000:1000 \
            -e HOME=/tmp/codex-home \
            -e XDG_CONFIG_HOME=/tmp/codex-config \
            -e XDG_CACHE_HOME=/tmp/codex-cache \
            -e CODEX_HELPER_TEAMS_TOKEN_CACHE=/tmp/codex-cache/teams-missing-token.json \
            -e CODEX_HELPER_TEAMS_READ_TOKEN_CACHE=/tmp/codex-cache/teams-missing-read-token.json \
