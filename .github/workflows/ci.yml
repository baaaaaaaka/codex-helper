name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  targeted-test:
    name: Targeted test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: Workflow lint (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7 -color

      - name: Check CI helper scripts (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' script; do
            bash -n "$script"
          done < <(find scripts/ci -name '*.sh' -print0)

      - name: Script unit tests (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          python3 -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Teams auth bootstrap dry-run (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          python3 -m unittest scripts/tests/test_teams_auth_bootstrap_scripts.py

      - name: Script unit tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          py -3 -m unittest discover -s scripts/tests -p "test_*.py"

      - name: Teams auth bootstrap dry-run (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          py -3 -m unittest scripts/tests/test_teams_auth_bootstrap_scripts.py

      - name: gofmt (verify)
        shell: bash
        run: |
          bad="$(gofmt -l .)"
          if [ -n "$bad" ]; then
            echo "gofmt required for:"
            echo "$bad"
            exit 1
          fi

      - name: go mod tidy (verify)
        shell: bash
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "go.mod/go.sum not tidy"
            git diff go.mod go.sum
            exit 1
          fi

      - name: Local proxy self-loop regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/localproxy -count=1 -run 'TestHTTPProxy(RejectsSelfLoopTargets|ServeHTTPRejectsSelfLoopTargets|SelfTargetDetection)$' -v

      - name: Cross-compile check (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          GOOS=darwin  GOARCH=arm64 go build ./...
          GOOS=darwin  GOARCH=amd64 go build ./...
          GOOS=windows GOARCH=amd64 go build ./...
          GOOS=linux   GOARCH=arm64 go build ./...

      - name: Setup SSHD for integration tests (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo bash scripts/ci/retry.sh 5 5 apt-get update
          sudo bash scripts/ci/retry.sh 5 5 apt-get install -y openssh-server
          sudo mkdir -p /run/sshd
          SSH_TEST_USER="ssh-test"
          if ! id -u "$SSH_TEST_USER" >/dev/null 2>&1; then
            sudo useradd -m -s /bin/bash -p '$6$ci$WiNqQDjl.EMvmwex4uixbzCpYwPdZ5pjMhtV6AMb004JamOVMOgqYaNOYOgWVmv/1Eq9TSb.yuZ94xGrgVNuS/' "$SSH_TEST_USER"
          fi
          SSH_TEST_DIR="$(mktemp -d)"
          ssh-keygen -t ed25519 -N "" -f "$SSH_TEST_DIR/host_key"
          ssh-keygen -t ed25519 -N "" -f "$SSH_TEST_DIR/test_key"
          sudo install -d -m 700 -o "$SSH_TEST_USER" -g "$SSH_TEST_USER" "/home/$SSH_TEST_USER/.ssh"
          sudo install -m 600 -o "$SSH_TEST_USER" -g "$SSH_TEST_USER" "$SSH_TEST_DIR/test_key.pub" "/home/$SSH_TEST_USER/.ssh/authorized_keys"
          chmod 700 "$SSH_TEST_DIR"
          chmod 600 "$SSH_TEST_DIR/test_key" "$SSH_TEST_DIR/test_key.pub" "$SSH_TEST_DIR/host_key"
          cat > "$SSH_TEST_DIR/sshd_config" <<EOF
          Port 22222
          ListenAddress 127.0.0.1
          HostKey $SSH_TEST_DIR/host_key
          AuthorizedKeysFile /home/$SSH_TEST_USER/.ssh/authorized_keys
          PasswordAuthentication no
          ChallengeResponseAuthentication no
          KbdInteractiveAuthentication no
          UsePAM no
          PermitRootLogin no
          PubkeyAuthentication yes
          StrictModes no
          AllowTcpForwarding yes
          PermitOpen any
          PidFile $SSH_TEST_DIR/sshd.pid
          AllowUsers ${SSH_TEST_USER}
          LogLevel ERROR
          EOF
          sudo /usr/sbin/sshd -t -f "$SSH_TEST_DIR/sshd_config"
          sudo /usr/sbin/sshd -f "$SSH_TEST_DIR/sshd_config"
          for _ in {1..20}; do
            if ssh -i "$SSH_TEST_DIR/test_key" -p 22222 \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o BatchMode=yes \
              "${SSH_TEST_USER}@127.0.0.1" exit; then
              break
            fi
            sleep 0.2
          done
          {
            echo "SSH_TEST_HOST=127.0.0.1"
            echo "SSH_TEST_PORT=22222"
            echo "SSH_TEST_USER=${SSH_TEST_USER}"
            echo "SSH_TEST_KEY=$SSH_TEST_DIR/test_key"
          } >> "$GITHUB_ENV"

      - name: SSH live integration regressions (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          SSH_TEST_ENABLED=1 go test ./internal/ssh -count=1 -run 'TestTunnelIntegration(StartStop|AcceptsNewHostKey)$' -v
          SSH_TEST_ENABLED=1 SSH_STACK_INTEGRATION_TEST=1 go test ./internal/stack -count=1 -run 'TestStackIntegrationHTTPProxyConnectThroughSSHTunnel$' -v

      - name: SSH accept-new client support
        shell: bash
        run: |
          set -euo pipefail
          SSH_ACCEPT_NEW_OPTION_TEST=1 go test ./internal/ssh -count=1 -run 'TestOpenSSHAcceptNewOptionSupported$' -v

      - name: SSH host-key fallback regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/ssh -count=1 -run 'Test(BuildArgs_IncludesRequiredOptions|HostKeyArgsForTarget(Legacy(SeedsKnownHosts|HonorsExplicitStrictHostKeyChecking|SkipsScanWhenKnownHostExists|RetriesWithoutHashFlag|RejectsDiscardKnownHostsFile)|HonorsExplicitStrictHostKeyCheckingBeforeDetection|ValidatesTargetBeforeDetection)|UserKnownHostsFileExpandsHomeShortcut|DetectSSHAcceptNewSupport(RejectsUnsupportedOption|RejectsOldSSHWithoutConfigDump|IgnoresUnrelatedSSHFailure))$' -v
          go test ./internal/cli -count=1 -run 'Test(InitProfileInteractiveWithDepsDoesNotPromptForHostKeyConfirmation|InstallPublicKeyAcceptsNewHostKeysByDefault|ClassifySSHProbeFailureDoesNotTreatBannerOffendingAsHostKey)$' -v

      - name: Installer shell matrix tests (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          go test . -count=1 -run 'Test(InstallSh|WindowsPowerShell)'

      - name: Installer PATH/profile tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          go test . -count=1 -run 'Test(InstallPs1|WindowsPowerShell)'

      - name: Recent install disk/npm regressions (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          go test . -count=1 -run 'TestInstallSh(Checksum(DownloadFailureRemainsBestEffort|Mismatch)|SuccessBanner|DiskSpace(FailureBanner|UnknownWarnsButContinues))|TestInstallPs1ChecksumDownloadRemainsBestEffort'
          go test ./internal/cli -count=1 -run 'Test(EnsureCodexInstall(edDoesNot(CacheProvidedPath|OverwriteCachedPathWithProvidedPath)|DiskSpace(WarnsAndContinuesWhenUnknown|DeduplicatesTargets))|RunCodexInstallerDiskSpace(PrecheckFailsBeforeShell|RechecksDiskSpaceAfterShellFailure)|RunSystemNpmCodexUpgrade(DiskPrecheckFailsBeforeInstall|ReportsDiskSpaceAfterNpmFailure|ForcesOptionalDependencyEnv)|RunCodexUpgradeBySourceSystemIgnoresManagedDiskTargets|CodexNPMInstallEnvClearsOptionalDependencyOmit|BootstrapScript(ContainsDiskSpacePreflight|ChecksNpmUsability|ContainsSelfValidation|RepairsMissingOptionalDependency)|BootstrapWindowsScriptContains(SelfValidation|DiskAndNpmChecks))$'

      - name: Recent install disk/npm regressions (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          go test . -count=1 -run 'TestInstallPs1(ChecksumDownloadFailureRemainsBestEffort|DiskSpaceFailureBanner|LatestViaAPI|KeepsPathSetupWhenInstallDirAlreadySet)'
          go test ./internal/cli -count=1 -run 'Test(EnsureCodexInstallDiskSpace(WarnsAndContinuesWhenUnknown|DeduplicatesTargets)|RunCodexUpgradeBySourceSystemIgnoresManagedDiskTargets|CodexNPMInstallEnvClearsOptionalDependencyOmit|BootstrapWindowsScriptContains(SelfValidation|DiskAndNpmChecks))$'

      - name: Recent run/installer/reuse regressions (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/cli -count=1 -run 'TestRunLike(UsesDirectModeWhenProxyDisabled|UsesDefaultCodexCommandInDirectMode|UsesProxyPreferenceWhenEnabled|ExplicitProfileForcesProxy|PersistsProxyEnabledAfterProfileSetup|ExplicitProfilePersistsProxyEnabledAfterProfileSetup)$'
          go test ./internal/proc ./internal/manager ./internal/cli -count=1 -run 'Test(CommandLine|LooksLikeProxyDaemonCmdline|FindReusableInstance(PicksMostRecentHealthy|IgnoresWrongInstanceID|SkipsUnhealthy)|WithProfileInstallEnvSkipsLegacyInstance|RunWithProfileOptionsSkipsLegacyInstance)$'
          go test . -count=1 -run 'TestInstallSh(ReloadsPathWhenHomeContainsSpaces|RemovesLegacyCodexClp|RemovesLegacyCodexClaudeProxyAndClpSymlink|RemovesCodexOwnedClaudeProxyWithoutVersionOutput|PreservesExternalClpSymlinkToClaudeProxy)$'

      - name: Recent run/installer/reuse regressions (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          go test ./internal/cli -count=1 -run 'TestRunLike(UsesDirectModeWhenProxyDisabled|UsesDefaultCodexCommandInDirectMode|UsesProxyPreferenceWhenEnabled|ExplicitProfileForcesProxy|PersistsProxyEnabledAfterProfileSetup|ExplicitProfilePersistsProxyEnabledAfterProfileSetup)$'
          go test ./internal/proc ./internal/manager ./internal/cli -count=1 -run 'Test(CommandLine|LooksLikeProxyDaemonCmdline|FindReusableInstance(PicksMostRecentHealthy|IgnoresWrongInstanceID|SkipsUnhealthy)|WithProfileInstallEnvSkipsLegacyInstance|RunWithProfileOptionsSkipsLegacyInstance)$'
          go test . -count=1 -run 'TestInstallPs1(RemovesLegacyCodexClpExe|RemovesLegacyCodexClaudeProxyAndClpCmd|PreservesExternalClpCmdReferencingClaudeProxy)$'

      - name: Recent codexhistory shared-cache regressions (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/codexhistory ./internal/tui -count=1

      - name: Recent codexhistory shared-cache regressions (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          go test ./internal/codexhistory ./internal/tui -count=1

      - name: Root/home/identity regressions (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          pattern='Test(DefaultPathForHome|ResolveEffectivePaths(_|$)|ResolveEffectiveLaunchPaths(_|$)|NewRootStore_PathOnlyAllowsForeignHomeWithoutRunnableIdentity|CodexExecutionContextForRun(RequiresRunnableIdentityForForeignHome|UsesResolvedForeignHomeAndExecIdentity)|ExecIdentityFor(HomeRejectsUnknownNonRootOwner|UserResolvesSupplementaryGroups)|ApplyExecIdentitySetsCommandCredentialAndEnv|PrepareYoloAuthOverrideReownsAuthFilesForExecIdentity|PrepareCodexSelfUpdateGuardEnv(PrependsWrapper|SkipsUnknownSource|ReownsWrapperForExecIdentity)|PreparePatchedBinaryForLaunchUsesAccessibleArtifactsForExecIdentity|RunWith(ExistingInstanceOptionsPreservesExplicitCodexHomeEnv|NewStackOptionsPreservesExplicitCodexHomeEnv)|ProxyStartBackgroundPassesResolvedConfigPathToDaemon|ResolveCodexDirSelection_).*$'
          go test ./internal/cli ./internal/codexhistory ./internal/config ./internal/cloudgate -count=1 -run "$pattern"

      - name: Root/home/identity regressions (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $pattern = 'Test(DefaultPathForHome|ResolveEffectivePaths(_|$)|ResolveEffectiveLaunchPaths(_|$)|NewRootStore_PathOnlyAllowsForeignHomeWithoutRunnableIdentity|CodexExecutionContextForRun(RequiresRunnableIdentityForForeignHome|UsesResolvedForeignHomeAndExecIdentity)|ExecIdentityFor(HomeRejectsUnknownNonRootOwner|UserResolvesSupplementaryGroups)|ApplyExecIdentitySetsCommandCredentialAndEnv|PrepareYoloAuthOverrideReownsAuthFilesForExecIdentity|PrepareCodexSelfUpdateGuardEnv(PrependsWrapper|SkipsUnknownSource|ReownsWrapperForExecIdentity)|PreparePatchedBinaryForLaunchUsesAccessibleArtifactsForExecIdentity|RunWith(ExistingInstanceOptionsPreservesExplicitCodexHomeEnv|NewStackOptionsPreservesExplicitCodexHomeEnv)|ProxyStartBackgroundPassesResolvedConfigPathToDaemon|ResolveCodexDirSelection_).*$'
          go test ./internal/cli ./internal/codexhistory ./internal/config ./internal/cloudgate -count=1 -run $pattern

      - name: Yolo auth regressions (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          pattern='Test(WriteFileAtomicallyReplacesExistingFile|PrepareYoloAuthOverride(MasksPlanAndRestores|IgnoresAccessTokenOnlyPlan|IgnoresOpaqueThreePartAccessToken|RecoversMaskedAuthFromBackupAfterStaleLease|DropsStaleLeaseAndBackupWhenAuthAlreadyClean|WaitsForLastLeaseBeforeRestore)|RunCodex(NewSession(SanitizesAuthForChildProcess|SanitizesAuthForRelativeCodexDir|RestoresAuthOnContextCancel)|SessionSanitizesAuthForChildProcess))$'
          go test ./internal/cli -count=1 -run "$pattern"

      - name: Yolo auth regressions (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $pattern = 'Test(WriteFileAtomicallyReplacesExistingFile|PrepareYoloAuthOverride(MasksPlanAndRestores|IgnoresAccessTokenOnlyPlan|IgnoresOpaqueThreePartAccessToken|RecoversMaskedAuthFromBackupAfterStaleLease|DropsStaleLeaseAndBackupWhenAuthAlreadyClean|WaitsForLastLeaseBeforeRestore)|RunCodex(NewSession(SanitizesAuthForChildProcess|SanitizesAuthForRelativeCodexDir|RestoresAuthOnContextCancel)|SessionSanitizesAuthForChildProcess))$'
          go test ./internal/cli -count=1 -run $pattern

      - name: Teams background keepalive regressions (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          CODEX_HELPER_TEAMS_TOKEN_CACHE: ${{ runner.temp }}/teams-missing-token.json
          CODEX_HELPER_TEAMS_READ_TOKEN_CACHE: ${{ runner.temp }}/teams-missing-read-token.json
          CODEX_HELPER_TEAMS_FILE_WRITE_TOKEN_CACHE: ${{ runner.temp }}/teams-missing-file-token.json
        run: |
          set -euo pipefail
          teams_cli_keepalive='Test(TeamsBackgroundKeepalive|TeamsRecover(.*)|RestartSelfExecsSameBinaryWithCurrentArgs|TeamsHelperReload|DiscoverTeamsPendingHelperActivation.*|TeamsService(InstallWritesSystemdUserUnitWithoutEnabling|InstallDefaultsCodexHomeForScope|InstallDoesNotFailWhenDefaultCodexHomeCannotBeDerived|InstallWritesMacOSLaunchAgentPlist|InstallWritesWindowsTaskXMLAndRegistersTask|InstallWritesWSLWindowsTask|SystemctlStop(IgnoresMissingWatchdogUnits|StillFailsWhenPrimaryStopFails)|StartAndRestartActivatePendingWindowsHelperBeforeOldEntry|Environment(MirrorsSingleCodexHomeEnv|ResolvesRelativeCodexDirEnv|PreservesConflictingExplicitCodexHomes)|Bootstrap(ShowsControlChatInForeground|CanSkipAutomaticControlChatOpen|PreparesControlChatWith(ServiceCodexHomeEnv|RelativeCodexDirEnv|ResolvedRegistryPath))|OpenURLCommandMatrix|DoctorReportsWSLHint|DoctorReportsWSLReadinessFailure|RunPowerShellIncludesCombinedOutputOnFailure|ActiveQueriesSupervisorWithoutGeneratedConfig)|ScheduleDelayedTeamsServiceStartUses(WSLWindowsTask|ConfiguredPowerShell|WindowsPendingActivation)|TeamsServiceDetached.*|UpgradeCmd.*)'
          teams_service_cleanup_pattern='Test(TeamsService(RetireLocalBridgeProcessesFiltersRegistryProfileAndWatchdog|UpgradeRetiresLargeRunAndWatchdogPileBeforeRestart|PrimaryRestartRetiresOnlyLocalBridgeProcessesBeforeStart|StartRetiresLocalBridgeProcessesOnlyWhenWSLTaskInactive|StartDoesNotRetireLocalBridgeProcessesWhenWSLTaskActive|PrimaryStartDoesNotRetireLocalBridgeProcessesWhenWSLTaskActive|RestartRetiresLargeLocalBridgePileBeforeStart|RestartDoesNotStartWhenBridgeCleanupFails|RepairCleansWindowsBridgeChildrenBeforeTaskRewrite|Watchdog(DefaultsAvoidTransientRestartLoops|WaitsForConsecutiveStaleSamples))|RunTeamsServiceWatchdogOnce(RestartsAfterConsecutiveStaleState|RequiresPersistentStaleAndResetsOnFreshPoll|SuccessfulRestartCooldownSuppressesRestartStorm|DoesNotCooldownFailedRestart))$'
          teams_runtime_keepalive='Test(TeamsBackgroundKeepalive|TeamsStartupFallback|GlobalInbound|InboundPoll|Bridge(LongRunningTurnKeepsOwnerHeartbeatActive|IdleOwnerHeartbeatPreservesActiveTurnFields|ListenStandbyDoesNotCreateControlChatOrPoll|PollChatReadRateLimitBlocksOnlyThatChat|ControlPollRateLimitDoesNotBlockWorkPollingWithoutRetrySleep|PollOnceContinuesOtherDueChatsAfterReadRateLimit|AckSendFailureDoesNotBlockCodexTurn|OutboxUploadRateLimitRecordsBlockWithoutRetrySleep|AcceptedOutboxRecoveryRateLimitRecordsBlockWithoutRetrySleep)|ClaimControlLease(PrimaryBeatsEphemeralAndEphemeralStaysStandby|DoesNotPreemptActiveTurn|ConcurrentManyMachinesSingleActive)|ControlLeaseForwardJumpAllowsTakeoverAfterSleep|IsStaleHandlesFutureHeartbeatAndThresholdBoundary|ValidateAndReleaseControlLease|RecordOwnerHeartbeat(WritesAndReadsOwner|UpdatesExistingOwner|TreatsExecRestartAsSameOwner|RefusesLiveOwnerWithDiagnostic|ReplacesDeadLocalOwnerBeforeStale)|RecoverStaleOwner(ReplacesStaleOwner|TreatsExecRestartAsSameOwner|ReplacesDeadLocalOwnerBeforeStale|RefusesLiveOwner)|ClearOwner(IsIdempotent|IfSameDoesNotClearDifferentOwner|IfSameDoesNotClearSameProcessDifferentInstance)|UpgradeBlockersDescribeBlockingWork|HasUpgradeBlockingWorkIgnoresImportCheckpointWithoutWork|PendingOutboxCrashRecoveryPromotesAcceptedDespiteRateLimitedChat|Graph(DoesNotRetryPostServerErrors|RetriesPostTooManyRequestsAfterRetryAfter))'
          go test ./internal/cli -count=1 -run "$teams_cli_keepalive" -v
          go test ./internal/cli -count=1 -run "$teams_service_cleanup_pattern" -v
          go test ./internal/teams ./internal/teams/store -count=1 -run "$teams_runtime_keepalive" -v
          go test ./internal/update -count=1 -run 'Test(WindowsDeferredMoveScript(WaitsRetriesAndEscapesPaths|SafetyInvariantsStress)|FindPendingReplacementsForPlatformSortsHighestAndParsesWindowsAssets|ProbeBinaryVersionParsesCodexProxyVersion)$' -v

      - name: Teams background keepalive regressions (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CODEX_HELPER_TEAMS_TOKEN_CACHE: ${{ runner.temp }}\teams-missing-token.json
          CODEX_HELPER_TEAMS_READ_TOKEN_CACHE: ${{ runner.temp }}\teams-missing-read-token.json
          CODEX_HELPER_TEAMS_FILE_WRITE_TOKEN_CACHE: ${{ runner.temp }}\teams-missing-file-token.json
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $teamsCliKeepalive = 'Test(TeamsBackgroundKeepalive|TeamsRecover(.*)|RestartSelfExecsSameBinaryWithCurrentArgs|TeamsHelperReload|DiscoverTeamsPendingHelperActivation.*|TeamsService(InstallWritesSystemdUserUnitWithoutEnabling|InstallDefaultsCodexHomeForScope|InstallDoesNotFailWhenDefaultCodexHomeCannotBeDerived|InstallWritesMacOSLaunchAgentPlist|InstallWritesWindowsTaskXMLAndRegistersTask|InstallWritesWSLWindowsTask|SystemctlStop(IgnoresMissingWatchdogUnits|StillFailsWhenPrimaryStopFails)|StartAndRestartActivatePendingWindowsHelperBeforeOldEntry|Environment(MirrorsSingleCodexHomeEnv|ResolvesRelativeCodexDirEnv|PreservesConflictingExplicitCodexHomes)|Bootstrap(ShowsControlChatInForeground|CanSkipAutomaticControlChatOpen|PreparesControlChatWith(ServiceCodexHomeEnv|RelativeCodexDirEnv|ResolvedRegistryPath)|SchedulesPendingHelperActivationBeforeStartingOldWindowsEntry)|OpenURLCommandMatrix|DoctorReportsWSLHint|DoctorReportsWSLReadinessFailure|RunPowerShellIncludesCombinedOutputOnFailure|ActiveQueriesSupervisorWithoutGeneratedConfig)|ScheduleDelayedTeamsServiceStartUses(WSLWindowsTask|ConfiguredPowerShell|WindowsPendingActivation)|RestartTeamsHelperFromTeamsUsesPending(ActivationForWindowsService|ProcessRestartForWindowsManualRun)|TeamsServiceDetached.*|UpgradeCmd.*)'
          $teamsServiceCleanupPattern = 'Test(TeamsService(RetireLocalBridgeProcessesFiltersRegistryProfileAndWatchdog|UpgradeRetiresLargeRunAndWatchdogPileBeforeRestart|PrimaryRestartRetiresOnlyLocalBridgeProcessesBeforeStart|StartRetiresLocalBridgeProcessesOnlyWhenWSLTaskInactive|StartDoesNotRetireLocalBridgeProcessesWhenWSLTaskActive|PrimaryStartDoesNotRetireLocalBridgeProcessesWhenWSLTaskActive|RestartRetiresLargeLocalBridgePileBeforeStart|RestartDoesNotStartWhenBridgeCleanupFails|RepairCleansWindowsBridgeChildrenBeforeTaskRewrite|Watchdog(DefaultsAvoidTransientRestartLoops|WaitsForConsecutiveStaleSamples))|RunTeamsServiceWatchdogOnce(RestartsAfterConsecutiveStaleState|RequiresPersistentStaleAndResetsOnFreshPoll|SuccessfulRestartCooldownSuppressesRestartStorm|DoesNotCooldownFailedRestart))$'
          $teamsRuntimeKeepalive = 'Test(TeamsBackgroundKeepalive|TeamsStartupFallback|GlobalInbound|InboundPoll|Bridge(LongRunningTurnKeepsOwnerHeartbeatActive|IdleOwnerHeartbeatPreservesActiveTurnFields|ListenStandbyDoesNotCreateControlChatOrPoll|PollChatReadRateLimitBlocksOnlyThatChat|ControlPollRateLimitDoesNotBlockWorkPollingWithoutRetrySleep|PollOnceContinuesOtherDueChatsAfterReadRateLimit|AckSendFailureDoesNotBlockCodexTurn|OutboxUploadRateLimitRecordsBlockWithoutRetrySleep|AcceptedOutboxRecoveryRateLimitRecordsBlockWithoutRetrySleep)|ClaimControlLease(PrimaryBeatsEphemeralAndEphemeralStaysStandby|DoesNotPreemptActiveTurn|ConcurrentManyMachinesSingleActive)|ControlLeaseForwardJumpAllowsTakeoverAfterSleep|IsStaleHandlesFutureHeartbeatAndThresholdBoundary|ValidateAndReleaseControlLease|RecordOwnerHeartbeat(WritesAndReadsOwner|UpdatesExistingOwner|TreatsExecRestartAsSameOwner|RefusesLiveOwnerWithDiagnostic|ReplacesDeadLocalOwnerBeforeStale)|RecoverStaleOwner(ReplacesStaleOwner|TreatsExecRestartAsSameOwner|ReplacesDeadLocalOwnerBeforeStale|RefusesLiveOwner)|ClearOwner(IsIdempotent|IfSameDoesNotClearDifferentOwner|IfSameDoesNotClearSameProcessDifferentInstance)|UpgradeBlockersDescribeBlockingWork|HasUpgradeBlockingWorkIgnoresImportCheckpointWithoutWork|PendingOutboxCrashRecoveryPromotesAcceptedDespiteRateLimitedChat|Graph(DoesNotRetryPostServerErrors|RetriesPostTooManyRequestsAfterRetryAfter))'
          go test ./internal/cli -count=1 -run $teamsCliKeepalive -v
          go test ./internal/cli -count=1 -run $teamsServiceCleanupPattern -v
          go test ./internal/teams ./internal/teams/store -count=1 -run $teamsRuntimeKeepalive -v
          go test ./internal/update -count=1 -run 'Test(WindowsDeferredMoveScript(WaitsRetriesAndEscapesPaths|SafetyInvariantsStress)|FindPendingReplacementsForPlatformSortsHighestAndParsesWindowsAssets|ProbeBinaryVersionParsesCodexProxyVersion)$' -v

      - name: Teams native supervisor validation (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo env "PATH=$PATH" CODEX_HELPER_SYSTEMD_ANALYZE_TEST=1 go test ./internal/cli -count=1 -run 'TestTeamsServiceSystemdUnitVerifiesWithSystemdAnalyzeCI$' -v

      - name: Teams native supervisor validation (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          CODEX_HELPER_PLUTIL_TEST=1 go test ./internal/cli -count=1 -run 'TestTeamsServiceLaunchAgentPlistLintsWithPlutilCI$' -v

      - name: Teams native supervisor validation (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $env:CODEX_HELPER_WINDOWS_TASK_REGISTER_TEST = "1"
          go test ./internal/cli -count=1 -run 'TestTeamsServiceWindowsTaskXMLRegistersWithTaskSchedulerCI$' -v

      - name: Teams Graph 429 stress (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci/teams_graph_429_stress.sh

      - name: Teams SQLite store migration and perf regressions
        shell: bash
        run: |
          set -euo pipefail
