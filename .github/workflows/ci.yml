      - name: Teams managed ASR dependency availability (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          py -3 -c "import sys, venv; raise SystemExit(0 if sys.version_info >= (3, 10) else 1)"
          function Invoke-Retry([scriptblock]$Command) {
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              try {
                & $Command
                return
              } catch {
                if ($attempt -eq 3) {
                  throw
                }
                Start-Sleep -Seconds 5
              }
            }
          }
          Invoke-Retry {
            $out = py -3 -m pip index versions qwen-asr
            if (-not ($out | Select-String -SimpleMatch "0.0.6")) { throw "qwen-asr 0.0.6 not listed" }
          }
          Invoke-Retry {
            $out = py -3 -m pip index versions imageio-ffmpeg
            if (-not ($out | Select-String -SimpleMatch "0.6.0")) { throw "imageio-ffmpeg 0.6.0 not listed" }
          }
          Invoke-Retry {
            $out = py -3 -m pip index versions torch
            if (-not ($out | Select-String -Pattern "2\.(4|5|6|7|8|9|10|11|12)\.")) { throw "supported torch version not listed" }
          }
          function Test-ManagedASRAsset([string]$Url) {
            Write-Host "checking $Url"
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              try {
                $response = Invoke-WebRequest -Uri $Url -Method Head -MaximumRedirection 5 -TimeoutSec 30 -SkipHttpErrorCheck
                $status = [int]$response.StatusCode
                if ($status -ge 200 -and $status -lt 300) {
                  return
                }
                if ($status -eq 404 -or $status -eq 410) {
                  throw "missing managed ASR asset ($status): $Url"
                }
                if ($attempt -eq 3 -and ($status -eq 408 -or $status -eq 429 -or ($status -ge 500 -and $status -lt 600))) {
                  Write-Host "::warning::managed ASR asset check was rate-limited or temporarily unavailable after retries (HTTP $status): $Url"
                  return
                }
                throw "managed ASR asset check failed with HTTP ${status}: $Url"
              } catch {
                if ($attempt -eq 3) {
                  throw
                }
                Start-Sleep -Seconds 5
              }
            }
          }
          $target = "x86_64-pc-windows-msvc"
          $url = "https://github.com/astral-sh/python-build-standalone/releases/download/20260510/cpython-3.10.20+20260510-$target-install_only_stripped.tar.gz"
          Test-ManagedASRAsset $url
          Test-ManagedASRAsset "https://huggingface.co/ggml-org/Qwen3-ASR-0.6B-GGUF/resolve/928ab958557df9aa2ef1c93e0e83c7ad0933fae2/Qwen3-ASR-0.6B-Q8_0.gguf"
