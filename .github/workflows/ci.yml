        env:
          CODEX_REMOTE_TUI_CONTRACT_TEST: "1"
          CODEX_RUNTIME_CONTRACT_TEST: "1"
          CODEX_RUNTIME_TEST: "1"
          CODEX_RUNTIME_E2E_TEST: "1"
        run: |
          set -euo pipefail
          command -v codex >/dev/null
          go test ./internal/codexcontract -run 'TestInstalledCodex(RuntimeContract|RemoteTUI.*Handshake)' -count=1 -v
          go test ./internal/cli -run 'Test(ProbeCodexIntegration|InstalledCodexRuntimeMigrationDefersLivePrivateArtifacts)' -count=1 -v
          go test ./internal/responsespolicy -run TestServerRoutesResponsesAndLeavesNonResponsesTrafficUnchanged -count=1 -v
          go test ./internal/codexrunner -run 'Test(InstalledCodexStandardApprovalRuntime|PolicyStarterPreservesUserChatGPTOriginAndAddsOnlyResponsesGateway|AppServerRunner(PreservesBoundedCloudConfigErrorData|DefaultApprovalModeFailsClosed|AutomaticApprovalModeIsExplicit)|AutomaticApprovalResultMatrix|RemoteBrokerManualModeRelaysApprovalRequestsAndResponsesByteTransparent)' -count=1 -v

      - name: Codex standard approval runtime integration test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CODEX_REMOTE_TUI_CONTRACT_TEST: "1"
          CODEX_RUNTIME_CONTRACT_TEST: "1"
          CODEX_RUNTIME_TEST: "1"
          CODEX_RUNTIME_E2E_TEST: "1"
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $null = Get-Command codex -ErrorAction Stop
          go test ./internal/codexcontract -run 'TestInstalledCodex(RuntimeContract|RemoteTUI.*Handshake)' -count=1 -v
          go test ./internal/cli -run 'Test(ProbeCodexIntegration|InstalledCodexRuntimeMigrationDefersLivePrivateArtifacts)' -count=1 -v
          go test ./internal/responsespolicy -run TestServerRoutesResponsesAndLeavesNonResponsesTrafficUnchanged -count=1 -v
          go test ./internal/codexrunner -run 'Test(InstalledCodexStandardApprovalRuntime|PolicyStarterPreservesUserChatGPTOriginAndAddsOnlyResponsesGateway|AppServerRunner(PreservesBoundedCloudConfigErrorData|DefaultApprovalModeFailsClosed|AutomaticApprovalModeIsExplicit)|AutomaticApprovalResultMatrix|RemoteBrokerManualModeRelaysApprovalRequestsAndResponsesByteTransparent)' -count=1 -v

      - name: Managed-node install integration (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          CODEX_INSTALL_TEST: "1"
        run: |
          set -euo pipefail
          go test ./internal/cli -run TestEnsureCodexInstalledIntegrationManagedNode -count=1 -v

      - name: Native managed-node install integration (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CODEX_INSTALL_TEST: "1"
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          go test ./internal/cli -run TestEnsureCodexInstalledIntegrationManagedNode -count=1 -v

  codex-runtime-contract:
    name: Codex runtime contract (${{ matrix.os }} / ${{ matrix.codex-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        codex-version: ["0.131.0", "latest"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install exact Codex version (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          CODEX_VERSION: ${{ matrix.codex-version }}
        run: |
          set -euo pipefail
          bash scripts/ci/retry.sh 5 5 npm install -g --include=optional "@openai/codex@${CODEX_VERSION}"
          command -v codex >/dev/null
          codex --version
          codex app-server --help >/dev/null

      - name: Install exact Codex version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CODEX_VERSION: ${{ matrix.codex-version }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          & .\scripts\ci\retry.ps1 5 5 npm install -g --include=optional "@openai/codex@$env:CODEX_VERSION"
          $null = Get-Command codex -ErrorAction Stop
          & codex --version
          & codex app-server --help *> $null
          if ($LASTEXITCODE -ne 0) { throw "Codex app-server probe failed with exit code $LASTEXITCODE" }
          $winpty = Get-Command winpty -ErrorAction SilentlyContinue
          if ($null -eq $winpty) {
            $bundledWinpty = Join-Path $env:ProgramFiles "Git\usr\bin\winpty.exe"
            if (-not (Test-Path -LiteralPath $bundledWinpty)) {
              throw "winpty is required for the Windows remote TUI contract"
            }
            Add-Content -LiteralPath $env:GITHUB_PATH -Value (Split-Path -Parent $bundledWinpty)
          }

      - name: Run original-binary approval contracts
        shell: bash
        env:
          CODEX_REMOTE_TUI_CONTRACT_TEST: "1"
          CODEX_RUNTIME_CONTRACT_TEST: "1"
          CODEX_RUNTIME_TEST: "1"
          CODEX_RUNTIME_E2E_TEST: "1"
        run: |
          set -euo pipefail
          command -v codex >/dev/null
          go test ./internal/codexcontract -run 'TestInstalledCodex(RuntimeContract|RemoteTUI.*Handshake)' -count=1 -v
          go test ./internal/cli -run 'Test(ProbeCodexIntegration|InstalledCodexRuntimeMigrationDefersLivePrivateArtifacts)' -count=1 -v
          go test ./internal/responsespolicy -run TestServerRoutesResponsesAndLeavesNonResponsesTrafficUnchanged -count=1 -v
          go test ./internal/codexrunner -run 'Test(InstalledCodexStandardApprovalRuntime|PolicyStarterPreservesUserChatGPTOriginAndAddsOnlyResponsesGateway|AppServerRunner(PreservesBoundedCloudConfigErrorData|DefaultApprovalModeFailsClosed|AutomaticApprovalModeIsExplicit)|AutomaticApprovalResultMatrix|RemoteBrokerManualModeRelaysApprovalRequestsAndResponsesByteTransparent)' -count=1 -v
          printf '%s\n' \
            '{"schema":2,"os":"${{ matrix.os }}","codex_version":"${{ matrix.codex-version }}","authentication":"synthetic-chatgpt","official_binary":true,"default_responses_websocket":true,"analytics_enabled":true,"contracts":["app-server-schema","remote-tui-pty","production-remote-broker-bearer","manual-approval-byte-transparent","manual-headless-fail-closed","aaa-explicit","cli-probe","standard-user-approval","approval-request-matrix","analytics-user-approved","responses-websocket","responses-only-proxy-routing","chatgpt-origin-preserved","structured-cloud-config-errors"]}' \
            > "$RUNNER_TEMP/codex-runtime-contract.json"

      - name: Upload runtime contract proof
        uses: actions/upload-artifact@v4
        with:
          name: codex-runtime-contract-${{ matrix.os }}-${{ matrix.codex-version }}
          path: ${{ runner.temp }}/codex-runtime-contract.json

  full-go-test:
    name: Full go test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: go test (with coverage, Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          go test -timeout=20m -parallel=16 -coverprofile=coverage.out ./...

      - name: go test (without coverage, non-Linux)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          go test -timeout=20m -parallel=16 ./...

      - name: Coverage gate (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          threshold="40.0"
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/,"",$NF); print $NF}')"
          echo "Total coverage: ${total}% (threshold ${threshold}%)"
          awk -v total="$total" -v threshold="$threshold" 'BEGIN { if (total+0 < threshold+0) { printf("coverage %.2f%% < %.2f%%\n", total, threshold); exit 1 } }'

      - name: Upload coverage artifact (Linux only)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  race-test:
    name: Race test (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: go test -race (Linux only)
        run: go test -race ./...

  runtime-env-contract:
    name: Runtime environment contract (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: Managed Node and app-server environment contracts
        shell: bash
        run: |
          set -euo pipefail
          cli_pattern='Test(TeamsStandardRuntimeRefreshesManagedNodePATHAfterExecutorCreation|RefreshTeamsAppServerPATHUsesCurrentProcessPATH|RunCodexNewSessionUsesManagedNodeWithoutSystemNode|RunBeaconWorkerJobUsesManagedNodeWithoutSystemNode|CodexRuntimeEnvironment.*|MergeCLIEnvironment.*|CodexAppAuthIdentityRuntimeEnvPrependsTargetManagedNode)$'
          process_pattern='Test(MergeAppServerProcessEnv.*|AppServerRunnerRetries(LaunchFailureBeforeInitialization|TransportFailureDuringInitialization))$'
          go test ./internal/cli -count=1 -run "$cli_pattern" -v
          go test ./internal/codexrunner -count=1 -run "$process_pattern" -v
          go test ./internal/teams -count=1 -run 'Test(InfraLaunchFailureNotice|RunQueuedTurnReframesLaunchFailure|RunQueuedTurnReportsSharedAuthMigrationBlocker)$' -v

  linux-distro-smoke-build:
    name: Linux distro smoke build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: Build static linux-amd64 binary
        shell: bash
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o dist/codex-proxy ./cmd/codex-proxy
          chmod +x dist/codex-proxy

      - name: Build CLI test binary
        shell: bash
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go test ./internal/cli -c -o dist/codex_cli_test
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go test ./internal/codexcontract -c -o dist/codex_contract_test
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go test ./internal/codexrunner -c -o dist/codex_runtime_test
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go test ./internal/proc -c -o dist/codex_proc_test
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go test ./internal/teams -c -o dist/codex_teams_test
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go test ./internal/teams/store -c -o dist/codex_teams_store_test
          chmod +x dist/codex_cli_test dist/codex_contract_test dist/codex_runtime_test dist/codex_proc_test dist/codex_teams_test dist/codex_teams_store_test

      - name: Upload Linux distro smoke binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-distro-smoke-dist
          path: dist/
          if-no-files-found: error

  linux-distro-smoke:
    name: Linux distro smoke (${{ matrix.label }})
    runs-on: ubuntu-latest
    needs: [linux-distro-smoke-build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: CentOS7
            image: centos:7
            package_args: ca-certificates curl xz tar procps-ng util-linux python36 binutils
            path_activation_package_args: zsh tcsh
            path_activation_cases: sh bash zsh csh tcsh
          - label: Rocky8
            image: rockylinux:8
            package_args: ca-certificates curl xz tar procps-ng util-linux python3 binutils
            path_activation_package_args: zsh tcsh
            path_activation_cases: sh bash zsh csh tcsh
          - label: Ubuntu20.04
            image: ubuntu:20.04
            package_args: ca-certificates curl xz-utils tar procps util-linux python3 binutils
            path_activation_package_args: zsh fish csh tcsh
            path_activation_cases: sh bash zsh fish csh tcsh
    env:
      DISTRO_IMAGE: ${{ matrix.image }}
      DISTRO_PACKAGE_ARGS: ${{ matrix.package_args }}
      PATH_ACTIVATION_PACKAGE_ARGS: ${{ matrix.path_activation_package_args }}
      PATH_ACTIVATION_CASES: ${{ matrix.path_activation_cases }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux distro smoke binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-distro-smoke-dist
          path: dist

      - name: Restore executable bits
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          required=(
            dist/codex-proxy
            dist/codex_cli_test
            dist/codex_contract_test
            dist/codex_runtime_test
            dist/codex_proc_test
            dist/codex_teams_test
            dist/codex_teams_store_test
          )
          missing_required() {
            local missing=0
            for file in "${required[@]}"; do
              if [ ! -f "$file" ]; then
                echo "missing artifact file: $file" >&2
                missing=1
              fi
            done
            return "$missing"
          }
          if ! missing_required; then
            echo "::warning::download-artifact completed without all expected distro smoke binaries; retrying with gh run download"
            rm -rf dist
            for attempt in 1 2 3; do
              mkdir -p dist
              if gh run download "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY" --name linux-distro-smoke-dist --dir dist && missing_required; then
                break
              fi
              rm -rf dist
              if [ "$attempt" = 3 ]; then
                echo "linux-distro-smoke-dist artifact is still incomplete after retries" >&2
                exit 1
              fi
              sleep $((attempt * 5))
            done
          fi
          chmod +x "${required[@]}"

      - name: Teams managed ASR native dependency scan
        id: teams_asr_dependency_scan
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          img="$DISTRO_IMAGE"
          report_label="$(printf '%s' "${{ matrix.label }}" | tr '[:upper:]' '[:lower:]')"
          mkdir -p teams-asr-dependency-scan
          echo "==> $img (Teams managed ASR native dependency scan)"
          docker run --rm \
            -e DISTRO_PACKAGE_ARGS="$DISTRO_PACKAGE_ARGS" \
            -e REPORT_LABEL="$report_label" \
            -e ASR_SCAN_PYTHON_PROBE="${ASR_SCAN_PYTHON_PROBE:-audio}" \
            -v "$PWD/scripts/ci:/ci:ro" \
            -v "$PWD/teams-asr-dependency-scan:/reports" \
            "$img" bash -lc '
              set -euo pipefail
              report_json="/reports/${REPORT_LABEL}.json"
              report_text="/reports/${REPORT_LABEL}.txt"
              write_setup_failure_report() {
                local detail="$1"
                cat > "$report_json" <<EOF
          {
            "issues": [
              {
                "component": "ci-setup",
                "detail": "$detail",
                "kind": "setup_failed",
                "library": "",
                "path": "${REPORT_LABEL}",
                "required_version": ""
              }
            ],
            "missing_libraries": [],
            "missing_symbol_versions": [],
            "native_files": [],
            "native_files_scanned": 0,
            "needed_libraries": [],
            "required_versions": [],
            "scanner_version": 1
          }
          EOF
                cat > "$report_text" <<EOF
          Teams ASR dependency scan
          status: FAILED
          native files scanned: 0

          Setup failed before the scanner could write a full report:
            $detail
          EOF
              }
              if command -v apt-get >/dev/null 2>&1 || command -v dnf >/dev/null 2>&1 || command -v yum >/dev/null 2>&1; then
                # shellcheck disable=SC2086
                if ! bash /ci/install_container_packages.sh $DISTRO_PACKAGE_ARGS; then
                  write_setup_failure_report "package installation failed"
                  exit 1
                fi
              else
                echo "unsupported package manager for Teams ASR dependency scan"
                write_setup_failure_report "unsupported package manager"
                exit 1
              fi
              python_bin="$(command -v python3 || true)"
              if [ -z "$python_bin" ]; then
                python_bin="$(command -v python3.6 || true)"
              fi
              if [ -z "$python_bin" ]; then
                echo "python3 is required to run Teams ASR dependency scan"
                write_setup_failure_report "python3 is required"
                exit 1
              fi
              set +e
              "$python_bin" /ci/teams_asr_dependency_scan.py \
                --work-dir /tmp/teams-asr-dependency-scan \
                --report-json "$report_json" \
                --report-text "$report_text" \
                --python-probe "${ASR_SCAN_PYTHON_PROBE:-audio}"
              scan_status="$?"
              set -e
              if [ ! -s "$report_json" ] || [ ! -s "$report_text" ]; then
                write_setup_failure_report "scanner exited with status ${scan_status} before writing reports"
              fi
              exit "$scan_status"
            '

      - name: Upload Teams managed ASR dependency scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: teams-asr-dependency-scan-${{ matrix.label }}
          path: teams-asr-dependency-scan/
          if-no-files-found: warn

      - name: Assert Teams managed ASR dependency scan coverage
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          report_label="$(printf '%s' "${{ matrix.label }}" | tr '[:upper:]' '[:lower:]')"
          python3 scripts/ci/assert_teams_asr_dependency_report.py \
            --report-json "teams-asr-dependency-scan/${report_label}.json" \
            --label "${{ matrix.label }}" \
            --expected-cpu-plan-status repairable

      - name: Teams managed ASR native compatibility repair
        shell: bash
        run: |
          set -euo pipefail
          img="$DISTRO_IMAGE"
          docker run --rm \
            -e DISTRO_PACKAGE_ARGS="$DISTRO_PACKAGE_ARGS" \
            -e CODEX_HELPER_ASR_REAL_NATIVE_COMPAT_TEST=1 \
            -e CODEX_HELPER_ASR_EXPECT_NATIVE_COMPAT=1 \
            -v "$PWD/dist:/dist:ro" \
            -v "$PWD/scripts/ci:/ci:ro" \
            "$img" bash -lc '
              set -euo pipefail
              if command -v apt-get >/dev/null 2>&1 || command -v dnf >/dev/null 2>&1 || command -v yum >/dev/null 2>&1; then
                # shellcheck disable=SC2086
                bash /ci/install_container_packages.sh $DISTRO_PACKAGE_ARGS
              fi
              /dist/codex_teams_test -test.v -test.count=1 -test.run="TestManagedASRRealLlamaNativeCompatRepairsPinnedCPUAsset$"
            '

      - name: Teams managed ASR glibc 2.39 native compatibility repair
        shell: bash
        run: |
          set -euo pipefail
          img="$DISTRO_IMAGE"
          rm -rf glibc239-smoke
          mkdir -p glibc239-smoke
          docker run --rm \
            -v "$PWD/glibc239-smoke:/out" \
            ubuntu:24.04 bash -lc '
              set -euo pipefail
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends gcc libc6-dev binutils
              cat > /tmp/glibc238.c <<'"'"'EOF'"'"'
          #define _GNU_SOURCE
          #include <stdio.h>
          #include <string.h>
          int main(void) {
            char buf[8];
            size_t n = strlcpy(buf, "glibc238", sizeof(buf));
            printf("%zu:%s\n", n, buf);
            return 0;
          }
          EOF
              gcc -O2 /tmp/glibc238.c -o /out/glibc238-smoke
              readelf --version-info /out/glibc238-smoke | grep -q "GLIBC_2.38"
            '
          docker run --rm \
            -e DISTRO_PACKAGE_ARGS="$DISTRO_PACKAGE_ARGS" \
            -e CODEX_HELPER_ASR_REAL_GLIBC239_COMPAT_TEST=1 \
            -e CODEX_HELPER_ASR_GLIBC238_SMOKE_BINARY=/smoke/glibc238-smoke \
            -v "$PWD/dist:/dist:ro" \
            -v "$PWD/scripts/ci:/ci:ro" \
            -v "$PWD/glibc239-smoke:/smoke:ro" \
            "$img" bash -lc '
              set -euo pipefail
              if command -v apt-get >/dev/null 2>&1 || command -v dnf >/dev/null 2>&1 || command -v yum >/dev/null 2>&1; then
                # shellcheck disable=SC2086
                bash /ci/install_container_packages.sh $DISTRO_PACKAGE_ARGS
              fi
              set +e
              /smoke/glibc238-smoke >/tmp/glibc238-no-compat.out 2>/tmp/glibc238-no-compat.err
              no_compat_status="$?"
              set -e
              if [ "$no_compat_status" = 0 ]; then
                echo "GLIBC_2.38 smoke unexpectedly ran without native compat on $img" >&2
                cat /tmp/glibc238-no-compat.out >&2
                exit 1
              fi
              if ! grep -q "GLIBC_2.38" /tmp/glibc238-no-compat.err; then
                echo "GLIBC_2.38 smoke failed for an unexpected reason before native compat:" >&2
                cat /tmp/glibc238-no-compat.err >&2
                exit 1
              fi
              /dist/codex_teams_test -test.v -test.count=1 -test.run="TestManagedASRRealNativeCompatRepairsGLIBC238SmokeBinary$"
            '

      - name: Smoke test in container (doctor)
        shell: bash
        run: |
          set -euo pipefail
          img="$DISTRO_IMAGE"
          echo "==> $img"
          if [ "$img" = "centos:7" ]; then
            docker run --rm -v "$PWD/dist:/dist:ro" "$img" bash -c '
              sed -i "s/^mirrorlist=/#mirrorlist=/g" /etc/yum.repos.d/CentOS-Base.repo 2>/dev/null || true
              sed -i "s|^#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g" /etc/yum.repos.d/CentOS-Base.repo 2>/dev/null || true
              /dist/codex-proxy proxy doctor'
          else
            docker run --rm -v "$PWD/dist:/dist:ro" "$img" /dist/codex-proxy proxy doctor
          fi

      - name: Installer PATH activation matrix in container
        shell: bash
        run: |
          set -euo pipefail
          img="$DISTRO_IMAGE"
          docker run --rm \
            -e DISTRO_PACKAGE_ARGS="$DISTRO_PACKAGE_ARGS $PATH_ACTIVATION_PACKAGE_ARGS" \
            -e CODEX_PROXY_REQUIRE_SHELL_MATRIX=1 \
            -e CODEX_PROXY_SHELL_MATRIX_CASES="$PATH_ACTIVATION_CASES" \
            -v "$PWD:/repo:ro" \
            -v "$PWD/scripts/ci:/ci:ro" \
            "$img" bash -lc '
              set -euo pipefail
              if command -v apt-get >/dev/null 2>&1 || command -v dnf >/dev/null 2>&1 || command -v yum >/dev/null 2>&1; then
                # shellcheck disable=SC2086
                bash /ci/install_container_packages.sh $DISTRO_PACKAGE_ARGS
              fi
              bash /repo/scripts/ci/install_path_activation_matrix.sh
            '

      - name: Run tests in containers
        shell: bash
        run: |
          set -euo pipefail
          teams_resource_pattern='Test(BridgePollDrops(HelperAttachmentEchoWithoutDurableMatch|RenderedHelperLabelOutputInWorkChat)|IsHelperAttachmentEchoMessageVariants|BridgePollOnceDoesNotRewriteStateForUnchangedNotDuePolls|InboundPollDecisionAlreadyPersistedRequiresBlockedStateToMatch|CodexOutputSymbolStressSurvivesTeamsCitationFilter|StripOAIMemoryCitationBlocks(RemovesInlineClosedBlock|PreservesFencedExamples|PreservesLiteralMultilineTagStress)|PlanTeamsHTMLChunks(Preserves(StatusListItemLines|LineBoundariesAcrossLimits)|UnicodeStressKeepsMarkersAndLimits|TextConservationStressCorpus|MarkdownTableKeepsEveryRow)|P1ArtifactManifest(WithoutFileWriteAuthLeavesFinalVisibleAndWarns|RejectedAfterFinalWhenAuthExists)|BridgeAttachment(SendFailureRestartReusesUploadedDriveItem|ReplayRejectsTamperedStagedFileBeforeUpload)|DownloadReferenceFileAttachments(UsesDriveItemMetadataName|WritesPrivateFile)|ReferenceAttachmentLocalName(TruncatesForPathBudgetAndDeduplicates|HandlesTinyPathBudgetDuplicates)|BestReferenceAttachmentNameUsesMetadataWhenAttachmentNameHasNoExtension|GraphGetSharedDriveItemMetadataReturnsNameAndMimeType|ParseArtifactManifestAllowsArbitraryExtensionsByDefault|PrepareOutboundAttachmentAllowsArbitraryExtensionAndRejectsSymlink|HistoryTieredScanTailDoesNotConsumeIncompleteTrailingLine|SimulatedLive(TeamsRenderCasesRoundTripThroughGraphCI|HelperE2EControlWorkAndStatusCI))$'
          teams_replay_fencing_pattern='Test(Bridge(InterruptedTurnDropsLateStreamingStatus|ShouldIgnoreFreshRenderedHelperCanceledEcho|TranscriptImportDeliveryLedgerPreventsBatchReplayAfterOutboxPruneAndCheckpointRegression|CompletesTurnWithTranscriptFinalForCanonicalDedupe|StreamingFinalUsesTranscriptCanonicalBeforeClosingForwarder|StreamingErrorDoesNotSuppressPendingFinalLikeProgress|TranscriptCanonicalFinal(PreservesObservedArtifactManifest|RequiresSameCodexTurn)|SyncLinkedTranscript(DeliveryLedgerPreventsReplayAfterOutboxPruneAndCheckpointRegression|MultipartDeliveryLedgerPreventsReplayAfterOutboxPruneAndCheckpointRegression|DeliveredLedgerDoesNotTriggerBacklogBlockAfterCheckpointRegression|StressSkipsLiveStatusesBeforeCheckpointWindow|SkipsStatusAlreadySkippedByTextHash|SkipsFinalAlreadySentLiveBeforeCheckpoint)|Flush(RecoversGraphMessageIDAfterAcceptedPersistFailure|RecoversAcceptedOutboxFromGraphAfterRestart|DefersGraphRecoveryWhenListMessagesFails|DoesNotGraphRecoverOrdinaryQueuedSendError))|KnownTranscriptOutboxDedupeStressCompactCountsOldLiveBeforeCheckpoint|MarkTurnInterruptedSkipsPendingTransientOutbox|RecordTranscriptDeliveryAdvancesCheckpointPosition)$'
          img="$DISTRO_IMAGE"
