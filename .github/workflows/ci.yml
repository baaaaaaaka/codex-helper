            -v "$PWD/scripts/ci:/ci:ro" "$img" \
            bash /ci/teams_supervisor_smoke.sh

      - name: Codex upgrade smoke in Linux containers (system/local)
        shell: bash
        run: |
          set -euo pipefail
          img="$DISTRO_IMAGE"
          echo "==> $img (codex upgrade command)"
          docker run --rm \
            -e DISTRO_PACKAGE_ARGS="$DISTRO_PACKAGE_ARGS" \
            -v "$PWD/dist:/dist:ro" \
            -v "$PWD/scripts/ci:/ci:ro" \
            "$img" bash -lc '
              set -euo pipefail
              if command -v apt-get >/dev/null 2>&1 || command -v dnf >/dev/null 2>&1 || command -v yum >/dev/null 2>&1; then
                # shellcheck disable=SC2086
                bash /ci/install_container_packages.sh $DISTRO_PACKAGE_ARGS
              else
                echo "unsupported package manager for codex upgrade smoke"
                exit 1
              fi

              NODE_MIN_MAJOR=16 NODE_MAJOR=22 NODE_BIN_DIR="$(bash /ci/install_node_local.sh)"
              export PATH="$NODE_BIN_DIR:$PATH"

              bash /ci/retry.sh 5 5 npm install -g --include=optional @openai/codex
              system_prefix="$(npm prefix -g)"
              /dist/codex-proxy --config /tmp/codex-upgrade-system.json --upgrade-codex
              codex --version >/dev/null
              system_path="$(command -v codex)"
              case "$system_path" in
                "$system_prefix"/*) ;;
                *)
                  echo "expected system codex under $system_prefix, got $system_path"
                  exit 1
                  ;;
              esac

              local_prefix="/tmp/codex-local-prefix"
              bash /ci/retry.sh 5 5 npm install -g --prefix "$local_prefix" --include=optional @openai/codex
              export CODEX_NPM_PREFIX="$local_prefix"
              export PATH="$local_prefix/bin:$local_prefix:$PATH"
              /dist/codex-proxy --config /tmp/codex-upgrade-local.json --upgrade-codex
              codex --version >/dev/null
              local_path="$(command -v codex)"
              case "$local_path" in
                "$local_prefix"/*) ;;
                *)
                  echo "expected local codex under $local_prefix, got $local_path"
                  exit 1
                  ;;
              esac
            '

  test:
    name: Test (${{ matrix.os }})
    runs-on: ubuntu-latest
    needs:
      - targeted-test
      - full-go-test
      - race-test
      - runtime-env-contract
      - linux-distro-smoke-build
      - linux-distro-smoke
    if: ${{ always() }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Verify parallel CI shards
        shell: bash
        run: |
          set -euo pipefail
          failures=0
          check() {
            name="$1"
            result="$2"
            echo "$name: $result"
            if [ "$result" != "success" ]; then
              failures=$((failures + 1))
            fi
          }
          check targeted-test "${{ needs.targeted-test.result }}"
          check full-go-test "${{ needs.full-go-test.result }}"
          check race-test "${{ needs.race-test.result }}"
          check runtime-env-contract "${{ needs.runtime-env-contract.result }}"
          check linux-distro-smoke-build "${{ needs.linux-distro-smoke-build.result }}"
          check linux-distro-smoke "${{ needs.linux-distro-smoke.result }}"
          if [ "$failures" -ne 0 ]; then
            echo "$failures CI shard(s) failed or did not run"
            exit 1
          fi
