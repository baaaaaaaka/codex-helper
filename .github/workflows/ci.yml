name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  targeted-test:
    name: Targeted test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: Workflow lint (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.11 -color

      - name: Check CI helper scripts (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' script; do
            bash -n "$script"
          done < <(find scripts/ci -name '*.sh' -print0)

      - name: Script unit tests (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          python3 -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Install PATH activation matrix (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo bash scripts/ci/retry.sh 5 5 apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive bash scripts/ci/retry.sh 5 5 apt-get install -y --no-install-recommends zsh fish csh tcsh
          CODEX_PROXY_REQUIRE_SHELL_MATRIX=1 bash scripts/ci/install_path_activation_matrix.sh

      - name: Install PATH activation matrix (macOS only)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v fish >/dev/null 2>&1; then
            for attempt in 1 2 3; do
              if HOMEBREW_NO_AUTO_UPDATE=1 brew install fish; then
                break
              fi
              if [ "$attempt" = "3" ]; then
                exit 1
              fi
              sleep $((attempt * 10))
            done
          fi
          CODEX_PROXY_REQUIRE_SHELL_MATRIX=1 bash scripts/ci/install_path_activation_matrix.sh

      - name: Teams auth bootstrap dry-run (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          python3 -m unittest scripts/tests/test_teams_auth_bootstrap_scripts.py

      - name: Script unit tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          py -3 -m unittest discover -s scripts/tests -p "test_*.py"

      - name: Check CI PowerShell scripts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          Get-ChildItem -LiteralPath scripts\ci -Filter *.ps1 | ForEach-Object {
            $null = [scriptblock]::Create((Get-Content -Raw -LiteralPath $_.FullName))
          }

      - name: Teams auth bootstrap dry-run (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          py -3 -m unittest scripts/tests/test_teams_auth_bootstrap_scripts.py

      - name: gofmt (verify)
        shell: bash
        run: |
          bad="$(gofmt -l .)"
          if [ -n "$bad" ]; then
            echo "gofmt required for:"
            echo "$bad"
            exit 1
          fi

      - name: go mod tidy (verify)
        shell: bash
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "go.mod/go.sum not tidy"
            git diff go.mod go.sum
            exit 1
          fi

      - name: Managed install convergence regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/managedinstall -count=1 -v
          go test ./internal/update -count=1 -run 'TestResolveInstallPath(UsesExactEnvInstallPathBeforeLegacyDir|MapsEnvCXPShimToManagedSibling|MapsCurrentCXPEntrypointToManagedSibling)$' -v
          go test ./internal/cli -count=1 -run '^TestLegacyUpdater' -v
          go test ./internal/cli -count=1 -run 'Test(UpgradeCmdUsesManagedDefaultWhenLaunchedAsCXP|FinalizeHelperEntrypoints(RepairsAndVerifiesCXPEntrypointVersion|FailsWhenCXPEntrypointCannotBeVerified|MigratesCXPRecordTargetToManagedBinary|PreservesLogicalRecordThroughSymlinkedLocal)|ReplaceSymlinkAtomicallyRejectsTargetChainThroughLinkPath|CurrentHelperInstallCandidatesTreatCXPAsShimOnly|RewriteLegacyCXPProfile.*|EnsureCXPShimForInstallPath(RepairsStalePOSIXSymlink|CreatesWindowsCmdShim|RepairsWindowsCmdShim|NormalizesManagedWindowsCmdShim|KeepsNonHelperWindowsCmd)|TeamsReleaseAutoUpdaterApply(UsesRunningGoBinAndUnifiesManagedDefault|PrefersLogicalDefaultThroughSymlinkedLocal|RepairsSelfLoopedManagedTargetThroughSymlinkedLocal|IgnoresUnusableSelfLoopedEnvWhenCurrentExecutableIsRunnable)|Teams(ServiceInstall(UsesManagedDefaultInsteadOfGoBinExecutable|MaterializesManagedDefaultBeforeRepointingFromGoBin|SkipsMaterializingSameTargetThroughSymlinkedLocal|CreatesMissingManagedDefaultBeforeRepointingFromGoBin|DoesNotTreatBlockedManagedDefaultAsInstallDir|RepairsCorruptManagedDefaultBeforeRepointingFromGoBin)|ServiceBootstrapDryRunDoesNotWriteOrStart))$' -v
          go test . -count=1 -run 'TestInstall(Sh|Ps1)KeepsPathSetupWhenInstallDirAlreadySet$' -v

      - name: CXP immutable runtime and process identity
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/helperruntime -count=1 -run 'Test(NormalizeVersion|LauncherEnvironment.*|InstallVersion.*|PublishDownloaded.*|EnsureStableEntry.*|Current.*|RuntimeProcessIdentity.*)$' -v
          go test ./internal/update -count=1 -run 'TestPerformUpdatePublishesImmutableRuntimeAndSwitchesActive$' -v
          go test ./internal/cli -count=1 -run 'Test(CurrentRuntimeOwnsUpdateTarget|PreferredCXPServiceEntryDoesNotUseUnrelatedRuntime|RefreshWindowsStableCXPExecutable.*|EnsureCXPShimForInstallPathNormalizesManagedWindowsCmdShim|CopyExecutableAtomicallyReplacesExistingFile)$' -v

      - name: Actual CXP process identity (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/ci/cxp_process_identity_smoke.sh

      - name: Actual CXP process identity (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\ci\cxp_process_identity_smoke.ps1

      - name: Local proxy self-loop regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/localproxy -count=1 -run 'TestHTTPProxy(RejectsSelfLoopTargets|ServeHTTPRejectsSelfLoopTargets|SelfTargetDetection)$' -v

      - name: Teams control and work chat rename regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/teams -count=1 -run 'Test(ChatTitlesUseDistinctLeadingEmoji|ParseControlDashboardCommandsDoNotRequireCodex|ParseRenameHostnameArgumentPreservesRegularRenameTitles|Bridge(ControlRenameUpdatesTeamsTopicAndDurableState|RenameHostnameUpdatesControlAndWorkChatTopics|EnsureControlChat(DoesNotAdoptExistingSingleMemberMeetingByTitleWithoutLocalBinding|PreservesUserControlTitle|RestoresPersistedUserControlTitle|BackfillsUserControlTitleIntoPartialDurableBinding|RenamesOldControlTopic)|SessionRenameUpdatesTeamsTopicAndDurableState))$' -v

      - name: Teams user annotation failure isolation regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/teams -count=1 -run 'TestBridgeAnnotate(IncomingUserMessageDoesNotMirrorWhenGraphUpdateFails|AttachmentPatchFailureDoesNotDisableTextAnnotationsOrMirror|ASRPatchFailureDoesNotDisableTextAnnotations)$' -v

      - name: Teams group chat guard regressions
        shell: bash
        run: |
          set -euo pipefail
          group_guard_pattern='Test(BridgeGroup(WorkChat|Guard).*|Graph(CreateGroupChatUsesConfiguredMembers|SendHTMLReplyWithQuoteUsesReplyAction))$'
          bench_pattern='Test(ValidateMembersRequiresExactOwnerAndTestUser|BenchSummaryPredicates|SanitizeMarkerKeepsGraphBenchNonceStable)$'
          go test ./internal/teams -count=1 -run "$group_guard_pattern" -v
          go test ./cmd/teams-graph-bench -count=1 -run "$bench_pattern" -v

      - name: Teams cross-machine registry regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/teams/delegation -count=1 -v
          go test ./internal/teams/machineregistry -count=1 -v
          go test ./cmd/teams-registry-probe -count=1 -v
          go test ./internal/cli -count=1 -run 'Test(Delegate|CandidatesFromMachineStatuses|RootCommandWiresExpectedSubcommandsAndFlags)' -v
          go test ./internal/teams -count=1 -run 'Test(BridgeMachine(Registry|Delegation).*|Graph(CreateOrGetMeetingChat(UsesStableExternalID|WindowUsesProvidedWindow)|OnlineMeetingWindowRefresh))$' -v

      - name: Responses adapter provider compatibility regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/responsesadapter -count=1 -run 'Test(UsageMarshalIncludesZeroCachedTokens|ProviderProfileReasoningEffortMapsXHighByProvider|OpenAIChatAdapter(HandlesUsageWithoutPromptTokenDetails|AppliesDeepSeekProviderProfile)|Facade(CompletedUsageIncludesZeroCachedTokens|ShellPolicy.*)|DefaultUpstreamHTTPClientTimesOutWaitingForResponseHeaders|OpenAIChatAdapterEmitsErrorWhenSSEBodyStaysIdle|NewUpstreamHTTPClientConfiguresBoundedProxyTransport)$' -v

      - name: Codex streaming transcript visibility regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/responsesadapter -count=1 -run 'Test(FacadeStreams(TextLifecycleAndStoresCompletedResponse|MixedTextAndToolCallLifecycle|ReasoningLifecycleAndStoresCompletedResponse)|CodexCompatReasoningSSEMaintainsActiveReasoningItem|ParseInputFoldsRawReasoningWithoutVisibleSummaryIntoAssistantToolCallTurn)$' -v
          go test ./internal/codexrunner -count=1 -run 'TestParseStreamEventJSONL(StreamsAgentProgressForBothCodexFormats|FinalAnswerAndTaskComplete|DropsEmptyAndUnknownPhaseAgentMessages)$' -v
          go test ./internal/codexrunner -count=1 -run 'TestLaunchOutputRecorder(RecoverParseErrors(ContinuesToRecoveredFinal|WithoutTerminalReturnsFirstError)|OmitCommandOutputStillReportsInvalidJSON)$' -v
          go test ./internal/beacon -count=1 -run 'TestJobStreamWriterReaderIgnoresPartialAndOversizedLines$' -v
          go test ./internal/teams -count=1 -run 'Test(CodexEventForwarder(DoesNotFlushFinalAnswerAsProgressOnIdle|TreatsTaskCompleteAgentMessageAsTerminal)|BeaconJobExecutorStreamsPerJobSidecarBeforeTerminal)$' -v
          go test ./internal/teams -count=1 -run 'Test(ParseCodexTranscript(ClassifiesEventCommentaryAsStatus|SkipsRawReasoningWithoutVisibleSummary)|BridgeStreams(NewFormatCommentaryToTeams|UnphasedAgentMessagesToTeams)|BridgeCanQueueLiveTurnOutbox(ChecksTargetTurn|ChecksTargetTurnSQLite|IgnoresUnrelatedSQLiteCorruption)|BridgeRunningTurnTranscriptBackfill(SendsStatusWithoutAdvancingMainCheckpoint|SkipsWhenLiveProgressAlreadyQueued)|BridgeSyncLinkedTranscript(DedupesLiveStreamed(Commentary|FinalAnswerFragmentSentAsStatus)|SkipsRecentTeamsTurnAgentMessageMirrorByCodexTurnID|KeepsAgentMessageWithoutRecentMirrorEvidence))$' -v

      - name: Teams durable routing authority regressions
        shell: bash
        run: |
          set -euo pipefail
          durable_routing_pattern='TestBridge(RestoreRegistryFromStoreDoesNotAdoptForeignControlBinding|DurableProjectionSteadyStateHasNoAllocationsOrRegistryWrite|ActiveAsyncSessionForIDStateUsesDurableBindingWithoutMutatingRegistry|PollOnce(SyncsRecreatedControlChatFromDurableBinding|DoesNotSyncForeignControlChatBinding|UsesDurableRecreatedWorkChatWhenRegistryIsStale|SQLitePersistsDynamicParkHandoffAndPreservesContinuation)|PollSessionResolutionFailureReleasesGlobalInboundForRetry|Process(DeferredInbound|QueuedTurns)UsesDurableRecreatedWorkChatWhenRegistryIsStale|ProcessDeferredInboundDoesNotRouteMissingDurableSessionThroughStaleRegistry(SQLite)?|SessionForIDState(PrefersDurableBindingOverStaleRegistry|DoesNotFallbackWhenDurableAuthorityRejectsRegistrySession)|IdleWorkChatAutoParkSweeperHandlesUserMessageFromIdleContinuationWithoutParking|RecreateSessionChatRebindsSessionAndRetiresOldRouting|RunningTurnTranscriptBackfillSendsStatusWithoutAdvancingMainCheckpoint)$'
          scope_authority_pattern='TestResolveStorePathFor(Maintenance(PinsLiveLegacyStoreWithoutMigrating|FreshOwnerBeatsStaleRicherStore|RejectsMultipleFreshAuthorities)|Scope(KeepsMaintenanceAuthorityAfterOwnerClears|DoesNotLetOldMaintenanceMarkerOverrideNewerStore))$'
          go test ./internal/teams -count=1 -run "$durable_routing_pattern" -v
          go test ./internal/teams -count=1 -run "$scope_authority_pattern" -v
          go test ./internal/teams/store -count=1 -run 'TestSQLiteSelectedSnapshotsMatchExpectedFields$' -v

      - name: Teams read-only diagnostics regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/cli -count=1 -run 'Test(TeamsStatusIsStrictlyReadOnlyAcrossLegacyRegistryAndStore|BuildTeamsAuthorityDiagnosticsReportsBindingAndPollHoles)$' -v
          go test ./internal/teams/store -count=1 -run 'TestLoadPathReadOnly(JSONDoesNotCreateLockOrModifyFiles|SQLite(DoesNotModifyDatabaseFamily|SeesLiveWALWithoutModifyingPersistentFiles|RetriesWhenWALAppearsDuringImmutableRead|LiveWALWithoutSHMFailsWithoutCreatingSidecar))$' -v

      - name: Teams recreate maintenance fence regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/teams/store -count=1 -run 'TestServiceControlDrainOperationFence$' -v
          go test ./internal/cli -count=1 -run 'Test(BeginTeamsBridgeDrainForChatRecreate(KeepsFencedUntilRelease|OnlyFencesPinnedStore|DoesNotMigrateLegacyStore)|TeamsChatRecreateDrainReleaseDoesNotClearNewerFence|DrainTeamsBridgeForChatRecreate(WaitsForOwnerAndClearsDrain|TimeoutClearsDrain))$' -v

      - name: Teams SQLite row-level migration regressions
        shell: bash
        run: |
          set -euo pipefail
          row_level_pattern='TestSQLite(SessionAndInboundRowUpdatesDoNotTouchColdState|ColdMetadataUpdatesDoNotRewriteHotRows|ControlChatBindingDoesNotRewriteHotRows|OfficialReleaseStoresUpgradeToCurrent)$'
          go test ./internal/teams/store -count=1 -run "$row_level_pattern" -v

      - name: Teams control status display regressions
        shell: bash
        run: |
          set -euo pipefail
          control_status_pattern='Test(BridgeControlStatus(ShowsNewestActiveChatLast|ChunkingKeepsNewestActiveChatLast|ShowsFolderLastUsedCompactLinkAndParkedResume)|BridgeDashboardSessionsShowLinkedChatAndParkedResume|RenderTeamsHTMLCompactTeamsChatLinkHidesVisibleURL)$'
          go test ./internal/teams -count=1 -run "$control_status_pattern" -v

      - name: Teams manual park and continuation regressions
        shell: bash
        run: |
          set -euo pipefail
          teams_poll_backlog_pattern='Test(InboundPollContinuationDoesNotForceCatchup|InboundPollContinuationDoesNotRegressActiveIntervals|InboundPollDecisionCatchupAndBlocked|BridgePollAllowsFreshHelperPrefixedUserPromptFromContinuation|BridgePollUsesDurableContinuationAfterOnePage|BridgePollPreservesOldContinuationWhenHeadAlsoTruncated|BridgeTerminalPollCleanupKeepsSharedActiveChat|BridgeControlParkSessionClearsPollState|BridgeControlParkSessionAmbiguousAndNotFound|BridgeControlParkRejectsQueuedOrRunningSession|BridgePollOnceSkipsExplicitParkedPollWithStaleContinuation|BridgeControlUnparkAliasResumesWithHeadPoll|BridgePollOnceRecoversStaleWorkContinuationErrorWithTerminalHead|StalePollContinuationErrorRequiresContinuationTokenSignal|BridgeIdleWorkChatAutoParkSweeper(DrainsIdleContinuationThenParksAndResumes|HandlesUserMessageFromIdleContinuationWithoutParking|RecoversStaleContinuationErrorWithTerminalHead|PreservesFreshHeadContinuationAfterStaleContinuationError|DoesNotRecoverContinuationForQueuedOrRunningSessions)|BridgeFinalAnswerPollBoostsLiveFinalAnswer|BridgeFinalAnswerPollBoostPreservesContinuation|BridgeFinalAnswerPollBoostSkipsTranscriptDelivery|BridgeFinalAnswerPollBoostSkipsParkedAndBlockedChats|BridgeQueuedTeamsPromptExplainsBlockedHistoryBacklog|BlockedTeamsPromptAckNextStepsMatchGateReasons|BridgeSessionCancel(LastDropsQueuedTurnBeforeRunningTurn|QueuedSelectorLeavesRunningTurn|RunningSelectorLeavesQueuedTurn|SelectorsReportMissingStatus)|LatestCancelableTurnIDPrefersQueuedOverRunning|ControlAdvancedHelpListsCancelSelectors|BridgeControlCancelLastRunningFallbackCancelsExecutor|BridgeRemindsWhenQueuedTurnWaitsOnActiveLocalTranscript|ParseControlCancel(TargetsControlFallback|NaturalLanguageFallsBackToCodex))$'
          freeze_resume_pattern='Test(RenderTeamsFreezeNoticeHTML|ResumeCommandForSessionUsesNumberWithoutHashFallback|FreezeNoticeResumeCommandMatchingRequiresWholeCommand|SentFreezeNoticeExistsRequiresExactResumeCommand|BridgePollOnce(ParksIdleWorkChatAndAppendsFreezeNoticeToLatestMessage|SendsStandaloneFreezeNoticeWhenLatestMessagePatchRejected|SendsStandaloneFreezeNoticeWhenNoLatestMessageTarget|SendsStandaloneFreezeNoticeWhenLatestMessageIsNotEditable|DoesNotRepeatFreezeNoticeFrom(SentOutbox|GraphHistory))|BridgeControlResume(SessionNumberReactivatesParkedWorkChat|KeyReactivatesParkedWorkChat|KeyOnlyReactivatesMatchingParkedChat))$'
          go test ./internal/teams -count=1 -run "$teams_poll_backlog_pattern" -v
          go test ./internal/teams -count=1 -run "$freeze_resume_pattern" -v
          go test ./internal/teams/store -count=1 -run 'TestChatPollCleanupClearsContinuationBackoffAndErrorForParkedAndClosed$' -v
          go test ./internal/cli -count=1 -run 'TestTeamsStatus(SeparatesCatchupBacklogAndInactiveRows|ShowsRunningTurnDetails)$' -v

      - name: Teams helper attachment echo race regressions
        shell: bash
        run: |
          set -euo pipefail
          attachment_echo_pattern='TestBridgePoll(DropsFreshHelperAttachmentEchoFromSendingOutbox|AllowsFreshHelperAttachmentEchoWhenOutboxAttachmentIDDiffers|AllowsFreshHelperAttachmentEchoWhenAttachmentIsMessageReference|AllowsFreshArtifactEchoShapedUserMessageWithAttachment|DropsHelperAttachmentEchoWithoutDurableMatch|DropsGlobalOutboundFromSiblingScope)$'
          go test ./internal/teams -count=1 -run "$attachment_echo_pattern" -v
          go test ./internal/teams/store -count=1 -run 'TestMarkOutboxSentIsIdempotent$' -v

      - name: Teams watchdog lifecycle drain regressions
        shell: bash
        run: |
          set -euo pipefail
          watchdog_pattern='TestTeamsServiceWatchdog(ClearsExpiredHelperUpgradeDrainWithIdleLocalOwner|DoesNotRestartExpiredHelperUpgradeDrainWithRemoteFreshOwner|ClearableUpgradeDrainWinsOverUnrelatedRemoteEvidence|ClearableReloadDrainWinsOverUnrelatedRemoteEvidence|DoesNotRestartExpiredHelperUpgradeDrainWithActiveTurn|ExpiredHelperUpgradeDrainIgnoresRestartCooldown|ClearsStaleHelperReloadDrainWithIdleLocalOwner|DoesNotRestartStaleHelperReloadDrainWithRemoteFreshOwner|DoesNotRestartStaleHelperReloadDrainWithActiveTurn|StaleHelperReloadDrainIgnoresRestartCooldown|ClearsLifecycleDrainBeforeStartingInactiveService|UnrelatedActiveTurnDoesNotBlockZombieDrainClear|RecoverableDrainWinsOverSeparatePausedState|ManyStateFilesRecoveryMatrix)$|TestRunTeamsServiceWatchdogOnce(DryRunLifecycleDrainClearDoesNotWriteState|ClearsExpiredHelperUpgradeDrainWithoutRestart|ClearsStaleHelperReloadDrainWithoutRestart|DoesNotClearFreshRemoteStoreDuringLocalDrainClear)$'
          store_pattern='Test(AbortExpiredHelperUpgradeDrainPreservesPreviousDrain|AbortExpiredHelperUpgradeDrainPreservesFreshActiveOwner|ClearStaleHelperReloadDrainPreservesFreshDrain|ClearStaleHelperReloadDrainPreservesFreshRemoteOwner)$'
          bridge_pattern='TestBridge(ClearsStaleHelperReloadDrainOnStart|DoesNotCompleteExpiredHelperUpgradeDrainWhenRunningVersionMissesTarget|CompletesExpiredHelperUpgradeDrainOnStart|DoesNotCompleteExpiredHelperUpgradeDrainOwnedByRemoteMachine|CompletesExpiredHelperUpgradeDrainWhenLastAttemptIsStale)$'
          go test ./internal/cli -count=1 -run "$watchdog_pattern" -v
          go test ./internal/teams/store -count=1 -run "$store_pattern" -v
          go test ./internal/teams -count=1 -run "$bridge_pattern" -v

      - name: Teams helper stats regressions
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/teams -count=1 -run 'Test(ParseCodexTokenStats.*|FormatCodexTokenStats.*|RenderCodexTokenStatsHTMLEscapesMetadataAndTableValues|BridgeWorkHelperStatsReadsLinkedTranscript|ParseWorkChatPlainTextIsCodexInput)$' -v
          go test ./internal/codexrunner -count=1 -run 'Test(ParseJSONLExtractsThreadTurnMessageFailureAndCachedTokens|AppServerRunnerStartThreadEncodesThreadStartAndTurnStart)$' -v

      - name: Teams ASR input regressions
        shell: bash
        run: |
          set -euo pipefail
          asr_pattern='Test(CommandASRTranscriber(ArgsReplacePlaceholders|RunsCommandAndParsesJSON|UsesPlainStdout|ReturnsStderrOnFailure)|Managed(QwenASRTranscriber(InvokesIsolatedRuntimeWithDefaults|ReportsRuntimeFailureWithStderr|LlamaOptInInvokesConfiguredRuntime|AutoFallsBackToTransformers|AutoDoesNotInstallTransformersFallbackByDefault|AutoDoesNotFallbackFromLlamaRuntimeFailure|DefaultDownloadsManagedLlamaRuntime|ExplicitLlamaRejectsConfiguredMissingBinary)|ASR(ParseLlamaOutputHandlesLanguageColon|Llama(ConfigUsesLightweightDiskPreflight|ModelMarkerRejectsCorruptCachedFile|RuntimeConcurrentSetupReusesSingleInstall|NativeCompatCanRepairOnlyKnownBundleIssues|BinaryMarkerRejects(MissingNativeCompatRuntime|StaleNativeCompatInterpreter)|BinaryInstall(FallsBackToCPUAssetWhenAcceleratedValidationFails|RepairsNativeCompatWithPatchelf|RestoresOldRuntimeWhenFinalNativeCompatValidationFails|RepairsNativeCompatWithGlibc239Profile|EscalatesNativeCompatProfileAfterRetry|HonorsExplicitCPUDevice)|AssetMatrixCoversExpectedAccelerationFallbacks)|FFmpegWheelAssetMatrixCoversExpectedPlatforms|DiskPreflightReportsActionableSpace|PublishDirRestoresOldTargetOn(Publish|PostPublish)Failure|TempCleanupRemovesOnlyStaleRuntimeDirs|RunnerScriptIsRewrittenAtomically|PackageInstallPlanIncludesTorchAndPinnedRuntimeTools|Bootstrap(FallsBackToManagedStandalonePython|PythonCandidatesArePlatformSpecific)|StandalonePython(TargetCommonPlatforms|PinnedAssetUsesDirectDownloadURL|DownloadRejectsSizeAndHashMismatch|DownloadsExtractsAndMarksRuntime)))|EnsureManagedASRFFmpegInstallsAndReusesManagedWheel|DownloadManagedASRLlamaFile(RejectsSizeAndHashMismatch|RetriesAndReplacesExistingTarget)|ExtractManagedASRZipRejectsUnsafePath|PrepareManagedASRAudioForLlamaDownloadsManagedFFmpeg|ASRCommandEnvCapsCPUThreadVariables|TeamsASR(FailureUserMessageClassifiesActionableFailures|StatusLineIsUserLevelAndDoesNotLeakConfiguration)|PromptWithASRTranscriptsLabelsSpeechAsFallibleContext|ASRTranscriptDisplayNameFallsBackToStableMediaLabel|ExecutionInputWithPreparedTeamsContext(CombinesSpeechReferencesAndImages|StressMixedInputsDoesNotExposeRawTeamsMedia)|HostedContentRefsFromMessageStressDedupesAcrossBodyAndMediaCards|IsTeamsMediaAttachment|TranscribeTeamsMediaAttachments(FiltersAndDefaults|RequiresConfiguredASRForMedia|TreatsEmptyCommandASRAsUnconfigured)|ShouldSkipTeamsOriginTranscriptRecordIgnoresCodexPromptAdditions|TeamsOrigin(TextHashesIncludesControlFallbackSource|TranscriptUserDisplayBodyUsesOriginalTeamsPrompt)|BridgeSyncLinkedTranscript(MirrorsTeamsOriginUserPromptWithoutASRContext|SkipsASROnlyTeamsOriginUserPrompt)|ASRProgressOutboxIsTransientAndSkippedOnInterrupt|Bridge(ControlAudioCard(FallsBackToCodexWithASR|WithoutASRReportsSetupMessage)|UpgradeDrainReplaysControlAudioCardWithoutASRAsSetupNoticeOnly|SessionTeams(AudioCard(IsDownloadedAndTranscribed|WithoutASRReportsSetupMessage|TranscribesMultipleClipsInOrder)|MediaLimitDoesNotDownloadOrRunASR|MixedHostedImageAndAudioKeepsImageOnlyAsAttachment|VideoCardIsDownloadedAndTranscribed)|SessionRetryASRFailureInterruptsRetryBeforeCodex))$'
          go test ./internal/teams -count=1 -run "$asr_pattern" -v
          go test ./internal/cli -count=1 -run 'Test(TeamsASR(ArgsFromEnvAndServiceOverrides|TranscriberDefaultsToManagedQwenRuntime|TranscriberReadsManagedLlamaEnv)|TeamsCommandWiresPlannedSubcommands|TeamsServiceInstallPreservesScopedEnvironment)$' -v

      - name: Teams managed ASR dependency availability (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          python3 -c 'import sys, venv; raise SystemExit(0 if sys.version_info >= (3, 10) else 1)'
          bash scripts/ci/retry.sh 3 5 python3 -m pip index versions qwen-asr | grep -F '0.0.6'
          bash scripts/ci/retry.sh 3 5 python3 -m pip index versions imageio-ffmpeg | grep -F '0.6.0'
          bash scripts/ci/retry.sh 3 5 python3 -m pip index versions torch | grep -E '2\.(4|5|6|7|8|9|10|11|12)\.'
          check_url() {
            local url="$1"
            local status
            echo "checking $url"
            for attempt in 1 2 3; do
              status="$(curl -sSIL -o /dev/null -w '%{http_code}' --max-time 30 "$url" || true)"
              if [[ "$status" =~ ^2[0-9][0-9]$ ]]; then
                return 0
              fi
              if [[ "$status" == "404" || "$status" == "410" ]]; then
                echo "missing managed ASR asset ($status): $url" >&2
                return 1
              fi
              if [ "$attempt" = 3 ]; then
                if [[ "$status" == "408" || "$status" == "429" || "$status" =~ ^5[0-9][0-9]$ ]]; then
                  echo "::warning::managed ASR asset check was rate-limited or temporarily unavailable after retries (HTTP $status): $url"
                  return 0
                fi
                echo "managed ASR asset check failed with HTTP ${status:-unknown}: $url" >&2
                return 1
              fi
              sleep 5
            done
          }
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)
              target=x86_64-unknown-linux-gnu
              llama_urls=(
                "https://github.com/ggml-org/llama.cpp/releases/download/b9437/llama-b9437-bin-ubuntu-vulkan-x64.tar.gz"
                "https://github.com/ggml-org/llama.cpp/releases/download/b9437/llama-b9437-bin-ubuntu-x64.tar.gz"
              )
              ffmpeg_url="https://files.pythonhosted.org/packages/a0/2d/43c8522a2038e9d0e7dbdf3a61195ecc31ca576fb1527a528c877e87d973/imageio_ffmpeg-0.6.0-py3-none-manylinux2014_x86_64.whl"
              ;;
            Linux-aarch64|Linux-arm64)
              target=aarch64-unknown-linux-gnu
              llama_urls=(
                "https://github.com/ggml-org/llama.cpp/releases/download/b9437/llama-b9437-bin-ubuntu-vulkan-arm64.tar.gz"
